<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kokoszka Platformer v1.0 - Tryb Detektywa</title>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 4px solid #333; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const TILE_SIZE = 40;

    const assets = {};
    const paths = {
        'KuraStojaca': 'postac/KuraStojaca.png', 'trawa': 'bloki/trawa.png', 'slonce': 'dekoracje/slonce.png',
        // Ładujemy na próbę tylko 3 najważniejsze pliki, żeby szybko zdiagnozować problem
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(paths).length;
    let gameState = "LOADING"; 
    let failedUrls = []; // Tu będziemy zapisywać błędy!

    Object.keys(paths).forEach(name => {
        let img = new Image();
        img.onload = () => { 
            loadedCount++; 
            if (loadedCount === totalAssets) gameState = "LOBBY"; 
        };
        img.onerror = () => { 
            failedUrls.push(img.src); // Zapisujemy PEŁNY adres, z którego przeglądarka próbowała pobrać
            loadedCount++; 
            if (loadedCount === totalAssets) gameState = "ERROR_SCREEN"; 
        };
        // Wymuszamy ominięcie pamięci cache
        img.src = paths[name] + "?v=" + new Date().getTime();
        assets[name] = img;
    });

    function draw() {
        ctx.clearRect(0,0,800,600);

        if (gameState === "LOADING") {
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 24px Arial";
            ctx.fillText(`SPRAWDZANIE PLIKÓW... (${loadedCount}/${totalAssets})`, 400, 300);
        } 
        else if (gameState === "ERROR_SCREEN") {
            ctx.fillStyle = "#220000"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "#ff4444"; ctx.textAlign = "center"; ctx.font = "bold 30px Arial";
            ctx.fillText("🚨 ZNALEZIONO PROBLEM! 🚨", 400, 100);
            
            ctx.fillStyle = "white"; ctx.font = "18px Arial";
            ctx.fillText("Przeglądarka próbowała pobrać pliki z tych adresów, ale dostała błąd 404:", 400, 160);
            
            ctx.fillStyle = "yellow"; ctx.font = "14px Consolas, monospace"; ctx.textAlign = "left";
            for(let i=0; i<failedUrls.length; i++) {
                ctx.fillText(failedUrls[i], 50, 220 + (i * 30));
            }
            
            ctx.fillStyle = "#aaa"; ctx.textAlign = "center"; ctx.font = "16px Arial";
            ctx.fillText("Zrób zrzut ekranu tej strony i wyślij mi go!", 400, 500);
        }
        else if (gameState === "LOBBY") {
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 40px Arial";
            ctx.fillText("SUKCES! PLIKI ZNALEZIONE!", 400, 300);
        }
    }

    function gameLoop() { draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
