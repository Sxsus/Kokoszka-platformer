<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer v6.0 - Hardcore Parkour</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #333; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const TILE_SIZE = 40;
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // ==========================================================
    // --- 1. SYSTEM ŁADOWANIA (.PNG) - BEZ RÓŻOWEGO EKRANU ---
    // ==========================================================
    const assets = {};
    const assetDef = {
        'KuraStojaca': 'postac/KuraStojaca.png', 'KuraChodzaca': 'postac/KuraChodzaca.png', 
        'KuraSkok': 'postac/KuraSkok.png', 'KuraSzybujaca': 'postac/KuraSzybujaca.png', 
        'KuraKlucanie': 'postac/KuraKlucanie.png', 'kuraNuggets': 'postac/kuraNuggets.png', 'kurczak': 'postac/kurczak.png',
        
        'trawa': 'bloki/trawa.png', 'ziemia': 'bloki/ziemia.png', 'kamien': 'bloki/kamien.png', 
        'drewno': 'bloki/drewno.png', 'lod': 'bloki/lod.png', 'piasek': 'bloki/piasek.png', 
        'void': 'bloki/void.png', 'woda': 'bloki/woda.png',
        
        'lawa': 'hazard/lawa.png', 'kolec': 'hazard/kolec.png', 'blokkolcow': 'hazard/blokkolcow.png',
        
        'checkPoint': 'mechanika/checkPoint.png', 'portal': 'mechanika/portal.png', 
        'rura': 'mechanika/rura.png', 'Ziarna': 'mechanika/Ziarna.png', 
        'tarcza': 'mechanika/tarcza.png', 'strzalkaSkoku': 'mechanika/strzalkaSkoku.png',
        
        'niebo': 'dekoracje/niebo.png', 'slonce': 'dekoracje/slonce.png', 'chmura': 'dekoracje/chmura.png', 
        'kwiat': 'dekoracje/kwiat.png', 'krzak': 'dekoracje/krzak.png', 'krazkowocow': 'dekoracje/krazkowocow.png', 
        'liscie': 'dekoracje/liscie.png', 'maledrzewo': 'dekoracje/maledrzewo.png', 
        'duzedrzewo': 'dekoracje/duzedrzewo.png', 'samotnyKamien': 'dekoracje/samotnyKamien.png',
        
        'zebatka': 'ui/zebatka.png', 'zegar': 'ui/zegar.png'
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetDef).length;
    let gameState = "LOADING"; 
    let pauseMenuState = "MAIN";

    // Unikamy Cache!
    const noCache = "?ver=" + Date.now();

    Object.keys(assetDef).forEach(name => {
        let img = new Image();
        img.onload = () => { assets[name] = img; loadedCount++; if (loadedCount === totalAssets) gameState = "LOBBY"; };
        img.onerror = () => {
            // BRAK RÓŻU - Rysujemy zastępczy ładny blok z nazwą, żeby dało się normalnie grać
            let c = document.createElement('canvas'); c.width = 40; c.height = 40;
            let cctx = c.getContext('2d');
            if (name.includes('trawa') || name.includes('krzak')) cctx.fillStyle = '#2ecc71'; 
            else if (name.includes('ziemia') || name.includes('drewno')) cctx.fillStyle = '#8e44ad'; 
            else if (name.includes('woda') || name.includes('lod')) cctx.fillStyle = '#3498db'; 
            else if (name.includes('lawa') || name.includes('kolec')) cctx.fillStyle = '#e74c3c'; 
            else if (name.includes('Kura')) cctx.fillStyle = '#f1c40f'; 
            else cctx.fillStyle = '#7f8c8d'; 
            
            cctx.fillRect(0,0,40,40);
            cctx.fillStyle = 'rgba(255,255,255,0.7)'; cctx.font = '9px Arial'; cctx.fillText(name.substring(0,6), 2, 20);
            assets[name] = c; 
            loadedCount++;
            if (loadedCount === totalAssets) gameState = "LOBBY";
        };
        img.src = assetDef[name] + noCache; 
    });

    // ==========================================================
    // --- 2. ZMIENNE GRY ---
    // ==========================================================
    let isPaused = false, currentLevel = "easy", cameraX = 0, keys = {};
    let progress = { easy: 0, medium: 0, hard: 0 };
    try { let saved = localStorage.getItem('kokoszka_v6'); if (saved) progress = JSON.parse(saved); } catch(e) {}

    let world = { tiles: [], hazards: [], checkpoints: [], chicks: [], waters: [], seeds: [], teleports: [], decos: [], powerups: [], lonelyStone: null };
    
    let player = { 
        x: 0, y: 0, w: 40, h: 40, vx: 0, vy: 0, speed: 5, onGround: false, crouching: false, dead: false, 
        respawnX: 0, respawnY: 0, deathTimer: 0, lastGlide: -10000, inWater: false, score: 0, dir: 1, 
        shieldTimer: 0, jumpBoostTimer: 0 
    };

    // ==========================================================
    // --- 3. NOWY GENERATOR POZIOMÓW (HARDCORE PARKOUR) ---
    // ==========================================================
    function buildLevel(diff) {
        currentLevel = diff;
        let len = diff === 'easy' ? 2250 : (diff === 'medium' ? 4500 : 6750);
        Object.keys(world).forEach(k => world[k] = []);
        
        let floorY = 520;
        let gapCounter = 0;
        let isHard = diff === 'hard';
        let isMed = diff === 'medium';
        let hazardChance = isHard ? 0.25 : (isMed ? 0.15 : 0.05);
        let gapChance = isHard ? 0.20 : (isMed ? 0.10 : 0.03);

        for (let i = 0; i < len; i++) {
            let x = i * TILE_SIZE;
            
            // TŁO - Chmury i Słońce (Nie można po nich skakać)
            if (i === 10) world.decos.push({x, y: 60, id: 'slonce'});
            if (i % 30 === 0) world.decos.push({x, y: 40 + Math.random()*120, id: 'chmura'});

            // Bezpieczna strefa startowa i końcowa
            if (i < 15 || i > len - 10) {
                world.tiles.push({x, y: 520, w: 40, h: 40, id: 'trawa'});
                world.tiles.push({x, y: 560, w: 40, h: 40, id: 'ziemia'});
                continue;
            }

            // --- GENEROWANIE PRZEPAŚCI (PARKOUR NAD LAWĄ) ---
            if (gapCounter > 0) {
                gapCounter--;
                // Na dnie przepaści jest lawa lub pustka
                world.hazards.push({x, y: 560, w: 40, h: 40, id: (Math.random() > 0.5 ? 'lawa' : 'void')});
                
                // Tworzenie lewitujących platform w trakcie przepaści
                if (gapCounter % 2 === 0 || (isHard && gapCounter % 3 === 0)) {
                     world.tiles.push({x, y: floorY - 40 - Math.random()*80, w: 40, h: 40, id: 'trawa'});
                }
                continue;
            }

            // Szansa na rozpoczęcie przepaści
            if (Math.random() < gapChance) {
                gapCounter = isHard ? Math.floor(Math.random() * 6) + 3 : Math.floor(Math.random() * 4) + 2; 
                continue;
            }

            // --- NORMALNA PODŁOGA ---
            world.tiles.push({x, y: floorY, w: 40, h: 40, id: 'trawa'});
            world.tiles.push({x, y: floorY+40, w: 40, h: 40, id: 'ziemia'});

            // --- DEKORACJE JAKO STAŁE BLOKI (MOŻNA PO NICH SKAKAĆ!) ---
            if (Math.random() < 0.15) {
                let sDecos = ['krzak', 'kwiat', 'maledrzewo', 'samotnyKamien'];
                let dec = sDecos[Math.floor(Math.random() * sDecos.length)];
                world.tiles.push({x, y: floorY - 40, w: 40, h: 40, id: dec}); // Dodane do płytek kolizyjnych!
            } else if (Math.random() < 0.05) {
                world.tiles.push({x, y: floorY - 120, w: 80, h: 120, id: 'duzedrzewo'}); // Duże drzewo jest stałe!
            }

            // Woda (nie można stać, można pływać)
            if (Math.random() < 0.05) {
                world.waters.push({x, y: floorY - 40, w: 40, h: 40, id: 'woda'});
            }

            // Hazardy (Kolce na podłodze)
            if (Math.random() < hazardChance) {
                world.hazards.push({x, y: floorY - 40, w: 40, h: 40, id: 'kolec'});
            }

            // Checkpointy i Moce
            if (i % 100 === 0) world.checkpoints.push({x, y: floorY - 40, w: 40, h: 40});
            if (i % 250 === 100) world.powerups.push({x, y: floorY - 140, w: 30, h: 30, id: 'tarcza'});
            if (i % 350 === 150) world.powerups.push({x, y: floorY - 140, w: 30, h: 30, id: 'strzalkaSkoku'});
            if (i % 15 === 0) world.seeds.push({x, y: floorY - 80, w: 20, h: 20});
            
            // Losowe wzniesienia terenu
            if (Math.random() < 0.1) {
                floorY += (Math.random() > 0.5 ? -40 : 40);
                if (floorY > 520) floorY = 520;
                if (floorY < 300) floorY = 300;
            }
        }
        
        player.x = 100; player.y = 400; player.respawnX = 100; player.respawnY = 400;
        player.vx = 0; player.vy = 0; player.score = 0; player.dead = false; 
        player.shieldTimer = 0; player.jumpBoostTimer = 0; player.lastGlide = -10000; cameraX = 0;
        world.chicks.push({x: (len-5)*TILE_SIZE, y: 485, w: 35, h: 35});
        gameState = "PLAYING"; isPaused = false; pauseMenuState = "MAIN";
    }

    // ==========================================================
    // --- 4. STEROWANIE ---
    // ==========================================================
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    function handleClick(mx, my) {
        if (gameState === "LOBBY") {
            if (mx > 300 && mx < 500) {
                if (my > 200 && my < 250) buildLevel('easy');
                else if (my > 300 && my < 350) buildLevel('medium');
                else if (my > 400 && my < 450) buildLevel('hard');
            }
        } 
        else if (gameState === "PLAYING") {
            if (mx > 740 && my < 60 && !isPaused) {
                isPaused = true; pauseMenuState = "MAIN"; keys = {};
            } 
            else if (isPaused) {
                if (pauseMenuState === "MAIN") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) { isPaused = false; } 
                        else if (my > 410 && my < 460) { pauseMenuState = "SETTINGS"; } 
                        else if (my > 480 && my < 530) { gameState = "LOBBY"; isPaused = false; } 
                    }
                } 
                else if (pauseMenuState === "SETTINGS") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) { 
                            progress = { easy: 0, medium: 0, hard: 0 };
                            localStorage.setItem('kokoszka_v6', JSON.stringify(progress));
                            alert("Zapis gry wyczyszczony!");
                        }
                        else if (my > 480 && my < 530) { pauseMenuState = "MAIN"; } 
                    }
                }
            }
        }
    }

    canvas.addEventListener("mousedown", e => {
        const r = canvas.getBoundingClientRect();
        handleClick((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
    });

    const mBtns = {
        left: {x: 20, y: 480, w: 70, h: 70, text: '⬅️'}, right: {x: 110, y: 480, w: 70, h: 70, text: '➡️'},
        down: {x: 65, y: 560, w: 70, h: 35, text: 'KUC'}, jump: {x: 710, y: 480, w: 70, h: 70, text: 'SKOK'},
        glide: {x: 620, y: 480, w: 70, h: 70, text: 'LOT'}
    };

    function handleTouches(e) {
        if(gameState === "PLAYING" && !isPaused) e.preventDefault();
        keys['a'] = false; keys['d'] = false; keys['s'] = false; keys['w'] = false; keys[' '] = false;
        
        const r = canvas.getBoundingClientRect();
        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && i === 0 && (gameState === "LOBBY" || isPaused || (tx > 740 && ty < 60))) handleClick(tx, ty);

            if (gameState === "PLAYING" && !isPaused) {
                if (tx>mBtns.left.x && tx<mBtns.left.x+mBtns.left.w && ty>mBtns.left.y && ty<mBtns.left.y+mBtns.left.h) keys['a'] = true;
                if (tx>mBtns.right.x && tx<mBtns.right.x+mBtns.right.w && ty>mBtns.right.y && ty<mBtns.right.y+mBtns.right.h) keys['d'] = true;
                if (tx>mBtns.down.x && tx<mBtns.down.x+mBtns.down.w && ty>mBtns.down.y && ty<mBtns.down.y+mBtns.down.h) keys['s'] = true;
                if (tx>mBtns.jump.x && tx<mBtns.jump.x+mBtns.jump.w && ty>mBtns.jump.y && ty<mBtns.jump.y+mBtns.jump.h) keys[' '] = true;
                if (tx>mBtns.glide.x && tx<mBtns.glide.x+mBtns.glide.w && ty>mBtns.glide.y && ty<mBtns.glide.y+mBtns.glide.h) keys['w'] = true;
            }
        }
    }

    if (isMobile) {
        canvas.addEventListener('touchstart', handleTouches, {passive: false});
        canvas.addEventListener('touchmove', handleTouches, {passive: false});
        canvas.addEventListener('touchend', handleTouches, {passive: false});
    }

    function collides(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    // ==========================================================
    // --- 5. LOGIKA GRY I FIZYKA ---
    // ==========================================================
    function update() {
        if (gameState !== "PLAYING" || isPaused) return;
        cameraX += (player.x - 380 - cameraX) * 0.1; if (cameraX < 0) cameraX = 0;
        
        if (player.shieldTimer > 0) player.shieldTimer--; 
        if (player.jumpBoostTimer > 0) player.jumpBoostTimer--;
        
        if (player.dead) { player.vy += 0.5; player.y += player.vy; player.deathTimer++; if (player.deathTimer > 60) { player.dead = false; player.x = player.respawnX; player.y = player.respawnY; player.vy = 0; player.deathTimer = 0; player.h = 40; } return; }

        const near = (obj) => obj.x > cameraX - 100 && obj.x < cameraX + 900;
        const activeTiles = world.tiles.filter(near); // WSZYSTKO CO JEST W TILES JEST TERAZ ŚCIANĄ (Nawet drzewa!)
        player.inWater = world.waters.filter(near).some(w => collides(player, w));

        if (keys[' '] && !player.dead) {
            let p = player.jumpBoostTimer > 0 ? -18.5 : -12.5; 
            if (player.inWater) player.vy = -6.5; 
            else if (player.onGround) { player.vy = p; player.onGround = false; }
        }

        let spd = player.speed; let gr = activeTiles.find(t => collides({...player, y: player.y + 1}, t));
        if (gr) { if(gr.id === 'lod') spd *= 1.6; if(gr.id === 'piasek') spd *= 0.5; }

        if (keys['s'] && !player.inWater) { if (!player.crouching) { player.h = 24; player.y += 16; player.crouching = true; } } else if (player.crouching) { let tR = { x: player.x, y: player.y - 16, w: player.w, h: 40 }; if (!activeTiles.some(t => collides(tR, t))) { player.h = 40; player.y -= 16; player.crouching = false; } }

        player.vx = 0; if (keys['a']) { player.vx = -spd; player.dir = -1; } if (keys['d']) { player.vx = spd; player.dir = 1; } if (player.inWater) player.vx *= 0.6; player.x += player.vx;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vx > 0) player.x = t.x - player.w; if (player.vx < 0) player.x = t.x + t.w; }});

        let canGlide = Date.now() - player.lastGlide > 10000;
        let glide = keys['w'] && !player.onGround && !player.inWater && canGlide; 
        if (glide) { player.vy = 1; player.lastGlide = Date.now(); }
        
        player.vy += player.inWater ? 0.22 : (glide ? 0 : 0.65); player.y += player.vy; player.onGround = false;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vy > 0) { player.y = t.y - player.h; player.vy = 0; player.onGround = true; } else if (player.vy < 0) { player.y = t.y + t.h; player.vy = 0; } }});

        if (player.y > 600) player.dead = true;
        world.hazards.filter(near).forEach(h => { if (collides(player, h) && player.shieldTimer <= 0) { player.dead = true; player.vy = -8.5; }});
        
        world.powerups.filter(near).forEach((p) => { 
            if (collides(player, p)) { 
                if (p.id === 'tarcza') player.shieldTimer = 300; 
                if (p.id === 'strzalkaSkoku') player.jumpBoostTimer = 600; 
                world.powerups.splice(world.powerups.indexOf(p), 1); 
            }
        });
        
        world.checkpoints.filter(near).forEach(c => { if (collides(player, c)) { player.respawnX = c.x; player.respawnY = c.y - 40; }});
        world.seeds.filter(near).forEach((s) => { if (collides(player, s)) { world.seeds.splice(world.seeds.indexOf(s), 1); player.score += 10; }});
        world.teleports.filter(near).forEach(tp => { if (collides(player, tp)) player.x += 1600; });
        world.chicks.forEach(c => { if (collides(player, c)) { world.chicks = []; progress[currentLevel] = 1; try { localStorage.setItem('kokoszka_v6', JSON.stringify(progress)); } catch(e){} }});
    }

    // ==========================================================
    // --- 6. RYSOWANIE INTERFEJSU ---
    // ==========================================================
    function draw() {
        if (gameState === "LOADING") {
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,800,600);
            let p = Math.round((loadedCount / totalAssets) * 100);
            ctx.fillStyle = "#444"; ctx.fillRect(200, 320, 400, 20);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(200, 320, 400 * (loadedCount / totalAssets), 20);
            ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 24px Arial";
            ctx.fillText(`TRWA ŁADOWANIE... ${p}%`, 400, 300);
            return;
        }

        // TŁO ZABLOKOWANE (Statyczne)
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,800,600);
        if(assets['niebo'] && assets['niebo'].width > 50) { ctx.drawImage(assets['niebo'], 0, 0, 800, 600); }

        if (gameState === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 40px Arial"; ctx.fillText("KOKOSZKA PLATFORMER", 400, 100);
            ['easy', 'medium', 'hard'].forEach((lv, i) => {
                ctx.fillStyle = progress[lv] ? "#2ecc71" : "#e67e22"; ctx.fillRect(300, 200 + i*100, 200, 50);
                ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText(`${lv.toUpperCase()} (${progress[lv]}/1)`, 400, 232 + i*100);
            });
            if(isMobile) { ctx.font = "16px Arial"; ctx.fillStyle = "yellow"; ctx.fillText("📱 Sterowanie dotykowe aktywne", 400, 550); }
        } 
        else if (gameState === "PLAYING") {
            const vL = cameraX - 120, vR = cameraX + 920; const isVis = (o) => o.x > vL && o.x < vR;

            world.decos.filter(isVis).forEach(d => { drawS(d.id, d.x-cameraX, d.y, 40, 40); });
            
            // W V6 tiles używają t.w i t.h, bo drzewo jest duże i stałe!
            world.tiles.filter(isVis).forEach(t => drawS(t.id, t.x-cameraX, t.y, t.w, t.h));
            
            world.hazards.filter(isVis).forEach(h => drawS(h.id, h.x-cameraX, h.y, h.w, h.h));
            ctx.globalAlpha = 0.6; world.waters.filter(isVis).forEach(w => drawS('woda', w.x-cameraX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            world.seeds.filter(isVis).forEach(s => drawS('Ziarna', s.x-cameraX, s.y, 20, 20));
            world.powerups.filter(isVis).forEach(p => drawS(p.id, p.x-cameraX, p.y, 30, 30));
            world.checkpoints.filter(isVis).forEach(cp => drawS('checkPoint', cp.x-cameraX, cp.y, 40, 40));
            world.chicks.forEach(c => drawS('kurczak', c.x-cameraX, c.y, 35, 35));

            ctx.save(); ctx.translate(player.x - cameraX + 20, player.y + player.h/2); if (player.dir === -1) ctx.scale(-1, 1);
            let s = player.dead ? 'kuraNuggets' : (player.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!player.onGround && !player.dead) s = 'KuraSkok'; if (keys['w'] && !player.onGround) s = 'KuraSzybujaca'; if (player.crouching) s = 'KuraKlucanie';
            drawS(s, -20, -player.h/2, 40, player.h); 
            if(player.shieldTimer > 0) { ctx.globalAlpha = 0.4; drawS('tarcza', -25, -25, 50, 50); ctx.globalAlpha = 1; }
            ctx.restore();

            drawS('zebatka', 740, 15, 45, 45); 
            ctx.fillStyle = "white"; ctx.font = "bold 22px Arial"; ctx.textAlign = "left"; 
            ctx.fillText("PKT: " + player.score, 25, 45);
            
            let tY = 85;

            // 1. Tarcza 🛡️
            if(player.shieldTimer > 0) { 
                drawS('zegar', 25, tY, 30, 30); 
                drawS('tarcza', 60, tY + 4, 22, 22); 
                ctx.fillStyle = "white"; ctx.font = "bold 20px Arial";
                ctx.fillText(Math.ceil(player.shieldTimer/60) + "s", 88, tY + 22); 
                tY += 40; 
            }

            // 2. Skok ⬆️
            if(player.jumpBoostTimer > 0) { 
                drawS('zegar', 25, tY, 30, 30); 
                drawS('strzalkaSkoku', 60, tY + 4, 22, 22); 
                ctx.fillStyle = "white"; ctx.font = "bold 20px Arial";
                ctx.fillText(Math.ceil(player.jumpBoostTimer/60) + "s", 88, tY + 22); 
                tY += 40; 
            }

            // 3. Cooldown Szybowania 🪂 (na czerwono)
            if(player.lastGlide > 0) {
                let cd = 10 - Math.floor((Date.now() - player.lastGlide) / 1000);
                if(cd > 0) {
                    drawS('zegar', 25, tY, 30, 30); 
                    drawS('KuraSzybujaca', 60, tY + 4, 22, 22); 
                    ctx.fillStyle = "#ff4444"; ctx.font = "bold 20px Arial";
                    ctx.fillText(cd + "s", 88, tY + 22); 
                }
            }

            if (isMobile) {
                ctx.globalAlpha = 0.5;
                Object.values(mBtns).forEach(b => {
                    ctx.fillStyle = "#fff"; ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.font = "bold 16px Arial";
                    ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2 + 6);
                });
                ctx.globalAlpha = 1.0;
            }

            if (isPaused) { 
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,600); 
                
                if (pauseMenuState === "MAIN") {
                    ctx.fillStyle = "white"; ctx.textAlign = "center"; 
                    ctx.font = "bold 40px Arial"; ctx.fillText("PAUZA", 400, 100); 
                    
                    ctx.fillStyle = "#f1c40f"; ctx.font = "bold 20px Arial"; ctx.fillText("PORADNIK STEROWANIA", 400, 150);
                    ctx.fillStyle = "white"; ctx.font = "18px Arial";
                    ctx.fillText("➡️ W prawo: [D] | ⬅️ W lewo: [A]", 400, 190);
                    ctx.fillText("⬆️ Skok: [SPACJA] | ⬇️ Kucanie: [S]", 400, 230);
                    ctx.fillText("🪂 Szybowanie (co 10s): [W]", 400, 270);
                    
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 340, 200, 50); ctx.fillStyle = "white"; ctx.fillText("WZNÓW", 400, 372);
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 410, 200, 50); ctx.fillStyle = "white"; ctx.fillText("USTAWIENIA", 400, 442);
                    ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 480, 200, 50); ctx.fillStyle = "white"; ctx.fillText("WYJDŹ DO LOBBY", 400, 512);
                } 
                else if (pauseMenuState === "SETTINGS") {
                    ctx.fillStyle = "white"; ctx.textAlign = "center"; 
                    ctx.font = "bold 40px Arial"; ctx.fillText("USTAWIENIA", 400, 150); 
                    ctx.fillStyle = "#e67e22"; ctx.fillRect(300, 340, 200, 50); ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText("ZRESETUJ ZAPIS GRY", 400, 372);
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(300, 480, 200, 50); ctx.fillStyle = "white"; ctx.fillText("WRÓĆ", 400, 512);
                }
            }
        }
        ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.font = "bold 14px Arial"; ctx.textAlign = "left"; ctx.fillText("v6.0", 10, 20);
    }

    function drawS(n, x, y, w, h) { 
        if (assets[n]) ctx.drawImage(assets[n], x, y, w, h); 
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
