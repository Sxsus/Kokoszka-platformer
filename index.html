<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer - Ultimate Engine v1.3</title>
    <style>
        body { 
            margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { 
            background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,0.9); border: 4px solid #333; 
            image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    // =========================================================================
    // KOKOSZKA PLATFORMER - CORE ENGINE v1.3
    // Zbudowano z myślą o maksymalnej wydajności, fizyce i czyszczeniu grafik.
    // =========================================================================

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false }); // Optymalizacja renderowania
    
    // --- STAŁE GRY ---
    const TILE_SIZE = 60; // Bloki x1.5
    const CHICKEN_SIZE = 90; // Kura x2.25
    const GRAVITY = 1.1; 
    const MAX_FALL_SPEED = 18;
    const JUMP_FORCE = -21;
    const GLIDE_SPEED = 2.5; 
    const MOVEMENT_SPEED = 9;
    
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // =========================================================================
    // MODUŁ 1: ZAAWANSOWANY MENEDŻER ZASOBÓW (AUTO-CROPPER & FLOOD FILL)
    // =========================================================================
    const assets = {};
    let loadedCount = 0;
    let gameState = "LOADING"; 

    // Definicje plików - szuka również w głównym folderze jako backup
    const assetDef = {
        'KuraStojaca': ['postac/KuraStojaca', 'KuraStojaca'], 'KuraChodzaca': ['postac/KuraChodzaca', 'KuraChodzaca'], 
        'KuraSkok': ['postac/KuraSkok', 'KuraSkok'], 'KuraSzybujaca': ['postac/KuraSzybujaca', 'KuraSzybujaca'], 
        'KuraKlucanie': ['postac/KuraKlucanie', 'KuraKlucanie'], 'kuraNuggets': ['postac/kuraNuggets', 'kuraNuggets'], 
        'kurczak': ['postac/kurczak', 'kurczak'],
        
        'trawa': ['bloki/trawa', 'trawa'], 'ziemia': ['bloki/ziemia', 'ziemia'], 'kamien': ['bloki/kamien', 'kamien'], 
        'drewno': ['bloki/drewno', 'drewno'], 'lod': ['bloki/lod', 'lod'], 'piasek': ['bloki/piasek', 'piasek'], 
        'void': ['bloki/void', 'void'], 'woda': ['bloki/woda', 'woda'],
        
        'lawa': ['hazard/lawa', 'lawa'], 'kolec': ['hazard/kolec', 'kolec'], 'blokkolcow': ['hazard/blokkolcow', 'blokkolcow'],
        
        'checkPoint': ['mechanika/checkPoint', 'checkPoint'], 'portal': ['mechanika/portal', 'portal'], 
        'rura': ['mechanika/rura', 'rura'], 'Ziarna': ['mechanika/Ziarna', 'Ziarna'], 
        'tarcza': ['mechanika/tarcza', 'tarcza'], 'strzalkaSkoku': ['mechanika/strzalkaSkoku', 'strzalkaSkoku'],
        
        'niebo': ['dekoracje/niebo', 'niebo'], 'slonce': ['dekoracje/slonce', 'slonce'],
        'kwiat': ['dekoracje/kwiat', 'kwiat'], 'krzak': ['dekoracje/krzak', 'krzak'], 'krazkowocow': ['dekoracje/krazkowocow', 'krazkowocow'], 
        'liscie': ['dekoracje/liscie', 'liscie'], 'maledrzewo': ['dekoracje/maledrzewo', 'maledrzewo'], 
        'duzedrzewo': ['dekoracje/duzedrzewo', 'duzedrzewo'], 'samotnyKamien': ['dekoracje/samotnyKamien', 'samotnyKamien'],
        
        'poziomo': ['ui/poziomo', 'poziomo'], 'skokk': ['ui/skokk', 'skokk'], 'zebatka': ['ui/zebatka', 'zebatka']
    };

    const totalAssets = Object.keys(assetDef).length;

    // MAGIA: Inteligentne czyszczenie tła i przycinanie obrazka do samych brzegów!
    function processImage(img, name) {
        if (name === 'niebo') return img; // Tła nie tykamy
        
        let c = document.createElement('canvas');
        c.width = img.width; c.height = img.height;
        let cx = c.getContext('2d', {willReadFrequently: true});
        cx.drawImage(img, 0, 0);
        
        try {
            let imgData = cx.getImageData(0, 0, c.width, c.height);
            let data = imgData.data;

            // 1. FLOOD FILL - Zjada fałszywą szachownicę z krawędzi do środka
            let stack = [];
            // Dodajemy całą ramkę obrazka jako punkty startowe
            for(let x=0; x<c.width; x++) { stack.push(x, 0); stack.push(x, c.height-1); }
            for(let y=0; y<c.height; y++) { stack.push(0, y); stack.push(c.width-1, y); }

            let visited = new Uint8Array(c.width * c.height);

            while(stack.length > 0) {
                let y = stack.pop(); let x = stack.pop();
                if(x < 0 || x >= c.width || y < 0 || y >= c.height) continue;
                
                let idx = y * c.width + x;
                if(visited[idx]) continue;
                visited[idx] = 1;

                let p = idx * 4;
                if(data[p+3] === 0) {
                    stack.push(x+1, y, x-1, y, x, y+1, x, y-1); continue;
                }

                let r = data[p], g = data[p+1], b = data[p+2];
                // Jeśli kolor to biały lub szary (siatka)
                let isGreyOrWhite = (Math.abs(r - g) < 30 && Math.abs(g - b) < 30 && r > 100);
                
                if(isGreyOrWhite) {
                    data[p+3] = 0; // Kasuj piksel!
                    stack.push(x+1, y, x-1, y, x, y+1, x, y-1); // Idź dalej wgłąb
                }
            }
            cx.putImageData(imgData, 0, 0);

            // 2. AUTO-CROP - Wykrywa gdzie zaczyna się prawdziwy obiekt i ucina pustkę
            let minX = c.width, minY = c.height, maxX = 0, maxY = 0;
            let hasPixels = false;
            
            for(let y=0; y<c.height; y++) {
                for(let x=0; x<c.width; x++) {
                    if (data[(y*c.width + x)*4 + 3] > 10) {
                        hasPixels = true;
                        if(x < minX) minX = x; if(x > maxX) maxX = x;
                        if(y < minY) minY = y; if(y > maxY) maxY = y;
                    }
                }
            }

            if(hasPixels && (maxX >= minX) && (maxY >= minY)) {
                let cropW = maxX - minX + 1;
                let cropH = maxY - minY + 1;
                let cropCanvas = document.createElement('canvas');
                cropCanvas.width = cropW; cropCanvas.height = cropH;
                cropCanvas.getContext('2d').drawImage(c, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
                return cropCanvas; // Zwraca idealnie docięty, czysty kwadrat/prostokąt!
            }
        } catch(e) {} 
        return c; // Fallback
    }

    // Generowanie zastępczych grafik jeśli brakuje pliku
    function generateFallback(name) {
        let c = document.createElement('canvas'); c.width = 60; c.height = 60; let cx = c.getContext('2d');
        if (name === 'zebatka') {
            cx.fillStyle = '#f39c12'; cx.beginPath(); cx.arc(30,30,25,0,Math.PI*2); cx.fill();
            cx.fillStyle = '#050505'; cx.beginPath(); cx.arc(30,30,10,0,Math.PI*2); cx.fill();
            return c;
        }
        if (name.includes('trawa') || name.includes('krzak')) cx.fillStyle = '#2ecc71'; 
        else if (name.includes('ziemia') || name.includes('drewno')) cx.fillStyle = '#8e44ad'; 
        else if (name.includes('woda') || name.includes('lod')) cx.fillStyle = '#3498db'; 
        else if (name.includes('lawa') || name.includes('kolec')) cx.fillStyle = '#e74c3c'; 
        else if (name.includes('Kura')) cx.fillStyle = '#f1c40f'; 
        else cx.fillStyle = '#7f8c8d'; 
        cx.fillRect(0,0,60,60); 
        cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '10px Arial'; cx.fillText(name.substring(0,6), 5, 30);
        return c;
    }

    function checkLoadComplete() {
        loadedCount++;
        if (loadedCount === totalAssets) gameState = "LOBBY";
    }

    Object.keys(assetDef).forEach(name => {
        let paths = assetDef[name];
        let attempts = [];
        paths.forEach(p => { attempts.push(`${p}.png.png`); attempts.push(`${p}.png`); });
        
        let attemptIndex = 0;
        let img = new Image();
        img.crossOrigin = "Anonymous";

        const tryNext = () => {
            if (attemptIndex < attempts.length) {
                img.src = attempts[attemptIndex] + "?v=" + Date.now(); 
                attemptIndex++;
            } else {
                assets[name] = generateFallback(name); 
                checkLoadComplete();
            }
        };
        img.onload = () => { 
            assets[name] = processImage(img, name); 
            checkLoadComplete(); 
        };
        img.onerror = tryNext; tryNext();
    });

    // =========================================================================
    // MODUŁ 2: STAN GRY I FIZYKA GRACZA
    // =========================================================================
    let isPaused = false;
    let pauseMenuState = "MAIN";
    let currentLevel = "easy"; 
    let cameraX = 0; 
    let keys = {};
    let prevKeys = {};
    
    let progress = { easy: 0, medium: 0, hard: 0 };
    try { let saved = localStorage.getItem('kokoszka_v13'); if (saved) progress = JSON.parse(saved); } catch(e) {}

    let world = { tiles: [], hazards: [], checkpoints: [], chicks: [], waters: [], seeds: [], teleports: [], decos: [], powerups: [] };
    
    let player = { 
        x: 0, y: 0, w: CHICKEN_SIZE, h: CHICKEN_SIZE, vx: 0, vy: 0, 
        speed: MOVEMENT_SPEED, onGround: false, crouching: false, dead: false, 
        respawnX: 0, respawnY: 0, deathTimer: 0, glideFuel: 0, inWater: false, 
        score: 0, dir: 1, shieldTimer: 0, jumpBoostTimer: 0 
    };

    let mobileCrouchToggle = false;

    // =========================================================================
    // MODUŁ 3: ZAAWANSOWANY GENERATOR POZIOMÓW
    // =========================================================================
    function buildLevel(diff) {
        currentLevel = diff;
        let len = diff === 'easy' ? 1200 : (diff === 'medium' ? 2400 : 3600);
        Object.keys(world).forEach(k => world[k] = []);
        
        let floorY = 400; 
        let gapCounter = 0;
        let safeZone = 10; 
        let isHard = diff === 'hard';
        let isMed = diff === 'medium';
        
        let hazardChance = isHard ? 0.15 : (isMed ? 0.08 : 0.02);
        let gapChance = isHard ? 0.12 : (isMed ? 0.05 : 0.0);

        world.decos.push({x: 600, y: 80, w: 120, h: 120, id: 'slonce'});

        for (let i = 0; i < len; i++) {
            let x = i * TILE_SIZE;

            // STREFA STARTU / METY
            if (i < 12 || i > len - 12) {
                world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'trawa'});
                for(let dy = floorY + TILE_SIZE; dy <= 600 + TILE_SIZE*2; dy += TILE_SIZE) {
                    world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                }
                continue;
            }

            // GENEROWANIE PRZEPAŚCI
            if (gapCounter > 0) {
                gapCounter--;
                world.hazards.push({x, y: 800, w: TILE_SIZE, h: TILE_SIZE, id: (Math.random() > 0.5 ? 'lawa' : 'void')});
                if (gapCounter === 0) safeZone = 4; 
                continue;
            }

            if (safeZone <= 0 && Math.random() < gapChance) {
                gapCounter = isHard ? Math.floor(Math.random() * 3) + 3 : 2; 
                continue;
            }

            if (safeZone > 0) safeZone--;

            // DUŻE BASENY WODNE
            if (safeZone <= 0 && Math.random() < 0.05) {
                let waterWidth = Math.floor(Math.random() * 4) + 2;
                for(let w = 0; w < waterWidth; w++) {
                    let wx = (i + w) * TILE_SIZE;
                    world.waters.push({x: wx, y: floorY + 10, w: TILE_SIZE, h: TILE_SIZE, id: 'woda'}); 
                    for(let dy = floorY + TILE_SIZE; dy <= 600 + TILE_SIZE*2; dy += TILE_SIZE) {
                        world.tiles.push({x: wx, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                    }
                }
                i += (waterWidth - 1); 
                safeZone = 3;
                continue;
            } 
            
            // PEŁNE BLOKI ZIEMI (Aż do dołu ekranu i poniżej)
            world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'trawa'});
            for(let dy = floorY + TILE_SIZE; dy <= 600 + TILE_SIZE*2; dy += TILE_SIZE) {
                world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
            }

            // ROŚLINY NA ZIEMI
            if (Math.random() < 0.15) {
                let dec = (Math.random() > 0.5) ? 'krzak' : 'kwiat';
                world.tiles.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: dec}); 
            } 

            // DRZEWA W TLE (Tylko dekoracja)
            if (Math.random() < 0.08) {
                if (Math.random() > 0.5) world.decos.push({x, y: floorY - 240, w: TILE_SIZE * 2.5, h: TILE_SIZE * 4, id: 'duzedrzewo'});
                else world.decos.push({x, y: floorY - 150, w: TILE_SIZE * 1.5, h: TILE_SIZE * 2.5, id: 'maledrzewo'});
            }

            // PUŁAPKI
            if (safeZone <= 0 && Math.random() < hazardChance) {
                world.hazards.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: 'kolec'});
                safeZone = 2; 
            }

            // PRZEDMIOTY
            if (i % 60 === 0) world.checkpoints.push({x, y: floorY - 120, w: TILE_SIZE, h: TILE_SIZE});
            if (i % 150 === 75) world.powerups.push({x, y: floorY - 250, w: 50, h: 50, id: 'tarcza'});
            if (i % 220 === 110) world.powerups.push({x, y: floorY - 250, w: 50, h: 50, id: 'strzalkaSkoku'});
            if (i % 12 === 0) world.seeds.push({x: x+15, y: floorY - 100, w: 30, h: 30});
            
            // WZGÓRZA
            if (safeZone <= 0 && Math.random() < 0.1) {
                floorY += (Math.random() > 0.5 ? -TILE_SIZE : TILE_SIZE);
                if (floorY > 480) floorY = 480;
                if (floorY < 200) floorY = 200; 
                safeZone = 2; 
            }
        }
        
        player.x = 300; player.y = 100; player.respawnX = 300; player.respawnY = 100;
        player.vx = 0; player.vy = 0; player.score = 0; player.dead = false; 
        player.shieldTimer = 0; player.jumpBoostTimer = 0; player.glideFuel = 0; cameraX = 0;
        mobileCrouchToggle = false; 
        world.chicks.push({x: (len-5)*TILE_SIZE, y: 300, w: 100, h: 100});
        gameState = "PLAYING"; isPaused = false; pauseMenuState = "MAIN";
    }

    // =========================================================================
    // MODUŁ 4: OBSŁUGA WEJŚCIA I JOYSTICKÓW
    // =========================================================================
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    const joysticks = { horizontal: {x: 30, y: 450, w: 110, h: 110}, vertical: {x: 660, y: 450, w: 110, h: 110} };

    function handleClick(mx, my) {
        if (gameState === "LOBBY") {
            if (mx > 300 && mx < 500) {
                if (my > 180 && my < 240) buildLevel('easy');
                else if (my > 260 && my < 320) buildLevel('medium');
                else if (my > 340 && my < 400) buildLevel('hard');
            }
        } 
        else if (gameState === "PLAYING") {
            if (mx > 720 && my < 80 && !isPaused) { isPaused = true; pauseMenuState = "MAIN"; keys = {}; } 
            else if (isPaused) {
                if (pauseMenuState === "MAIN") {
                    if (mx > 300 && mx < 500) {
                        if (my > 280 && my < 340) isPaused = false;
                        else if (my > 360 && my < 420) pauseMenuState = "SETTINGS";
                        else if (my > 440 && my < 500) { gameState = "LOBBY"; isPaused = false; } 
                    }
                } else if (pauseMenuState === "SETTINGS") {
                    if (mx > 300 && mx < 500) {
                        if (my > 320 && my < 380) { progress = { easy: 0, medium: 0, hard: 0 }; localStorage.setItem('kokoszka_v13', JSON.stringify(progress)); alert("Postęp Zresetowany!"); }
                        else if (my > 460 && my < 520) pauseMenuState = "MAIN";
                    }
                }
            }
        }
    }

    canvas.addEventListener("mousedown", e => {
        const r = canvas.getBoundingClientRect();
        handleClick((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
    });

    function handleTouches(e) {
        if(gameState === "PLAYING" && !isPaused) e.preventDefault();
        
        keys['a'] = false; keys['d'] = false; keys['w'] = false; keys[' '] = false;
        keys['s'] = mobileCrouchToggle; 
        
        const r = canvas.getBoundingClientRect();

        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && (gameState === "LOBBY" || isPaused || (tx > 720 && ty < 80))) { handleClick(tx, ty); return; }

            if (gameState === "PLAYING" && !isPaused && isMobile) {
                let jh = joysticks.horizontal;
                if (tx > jh.x - 30 && tx < jh.x + jh.w + 30 && ty > jh.y - 30 && ty < jh.y + jh.h + 30) {
                    let cX = jh.x + jh.w / 2;
                    if (tx < cX - 10) keys['a'] = true;
                    else if (tx > cX + 10) keys['d'] = true;
                }
                let jv = joysticks.vertical;
                if (tx > jv.x - 30 && tx < jv.x + jv.w + 30 && ty > jv.y - 30 && ty < jv.y + jv.h + 30) {
                    let cY = jv.y + jv.h / 2;
                    if (ty < cY) keys['w'] = true; // Góra = Skok/Lot
                }
            }
        }

        // Toggle Kucania
        if (e.type === 'touchstart' && gameState === "PLAYING" && !isPaused && isMobile) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let tx = (e.changedTouches[i].clientX - r.left) * (canvas.width / r.width);
                let ty = (e.changedTouches[i].clientY - r.top) * (canvas.height / r.height);
                let jv = joysticks.vertical;
                
                if (tx > jv.x - 30 && tx < jv.x + jv.w + 30 && ty > jv.y - 30 && ty < jv.y + jv.h + 30) {
                    if (ty > jv.y + jv.h / 2 + 10) { 
                        mobileCrouchToggle = !mobileCrouchToggle; 
                        keys['s'] = mobileCrouchToggle;
                    }
                }
            }
        }
    }

    if (isMobile) {
        canvas.addEventListener('touchstart', handleTouches, {passive: false});
        canvas.addEventListener('touchmove', handleTouches, {passive: false});
        canvas.addEventListener('touchend', handleTouches, {passive: false});
    }

    function collides(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    // =========================================================================
    // MODUŁ 5: PRECYZYJNA FIZYKA (SKOKI I SPADOCHRON)
    // =========================================================================
    function update() {
        if (gameState !== "PLAYING" || isPaused) return;
        
        cameraX += (player.x - 350 - cameraX) * 0.12; 
        if (cameraX < 0) cameraX = 0;
        
        if (player.shieldTimer > 0) player.shieldTimer--; 
        if (player.jumpBoostTimer > 0) player.jumpBoostTimer--;
        
        if (player.dead) { 
            player.vy += GRAVITY; player.y += player.vy; player.deathTimer++; 
            if (player.deathTimer > 60) { 
                player.dead = false; player.x = player.respawnX; player.y = player.respawnY; 
                player.vy = 0; player.deathTimer = 0; player.h = CHICKEN_SIZE; 
                mobileCrouchToggle = false; keys['s'] = false; 
            } 
            return; 
        }

        const near = (obj) => obj.x > cameraX - TILE_SIZE*2 && obj.x < cameraX + 800 + TILE_SIZE*2;
        const activeTiles = world.tiles.filter(near); 
        player.inWater = world.waters.filter(near).some(w => collides(player, w));

        // ZAAWANSOWANY SKOK (Wykrywa naciśnięcie raz)
        let jumpPressed = ((keys['w'] && !prevKeys['w']) || (keys[' '] && !prevKeys[' ']));
        
        if (jumpPressed && !player.dead) {
            if (player.onGround || player.inWater) {
                player.vy = player.jumpBoostTimer > 0 ? (JUMP_FORCE - 6) : JUMP_FORCE; 
                if (player.inWater) player.vy = JUMP_FORCE / 1.5; 
                player.onGround = false;
                player.glideFuel = 50; // Odnowienie spadochronu na skok
            }
        }

        let spd = player.speed; 
        let gr = activeTiles.find(t => collides({...player, y: player.y + 1}, t));
        if (gr) { if(gr.id === 'lod') spd *= 1.5; if(gr.id === 'piasek') spd *= 0.6; }

        // KUCANIE
        if (keys['s'] && !player.inWater) { 
            if (!player.crouching) { player.h = CHICKEN_SIZE/1.5; player.y += CHICKEN_SIZE/3; player.crouching = true; } 
        } else if (player.crouching) { 
            let tR = { x: player.x, y: player.y - CHICKEN_SIZE/3, w: player.w, h: CHICKEN_SIZE }; 
            if (!activeTiles.some(t => collides(tR, t))) { player.h = CHICKEN_SIZE; player.y -= CHICKEN_SIZE/3; player.crouching = false; } 
        }

        // RUCH X
        player.vx = 0; 
        if (keys['a']) { player.vx = -spd; player.dir = -1; } 
        if (keys['d']) { player.vx = spd; player.dir = 1; } 
        if (player.inWater) player.vx *= 0.6; 
        
        player.x += player.vx;
        activeTiles.forEach(t => { 
            if (collides(player, t)) { 
                if (player.vx > 0) player.x = t.x - player.w; 
                if (player.vx < 0) player.x = t.x + t.w; 
            }
        });

        // RUCH Y (GRAWITACJA I SPADOCHRON)
        if (player.onGround) {
            player.glideFuel = 60; // Max spadochronu
        }
        
        let isGliding = false;
        // Aktywacja spadochronu: Kura SPADA (vy > 0), jest w powietrzu, trzyma przycisk i ma paliwo
        if ((keys['w'] || keys[' ']) && !player.onGround && !player.inWater && player.vy > 0 && player.glideFuel > 0) {
            player.vy = GLIDE_SPEED; // Powolne opadanie
            player.glideFuel--;
            isGliding = true;
        }
        
        if (!isGliding) { 
            player.vy += player.inWater ? (GRAVITY*0.4) : GRAVITY; 
            if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;
        } 
        
        player.y += player.vy; 
        player.onGround = false;
        
        activeTiles.forEach(t => { 
            if (collides(player, t)) { 
                if (player.vy > 0) { player.y = t.y - player.h; player.vy = 0; player.onGround = true; } 
                else if (player.vy < 0) { player.y = t.y + t.h; player.vy = 0; } 
            }
        });

        // ŚMIERĆ I ZBIERANIE
        if (player.y > 1000) player.dead = true;
        world.hazards.filter(near).forEach(h => { if (collides(player, h) && player.shieldTimer <= 0) { player.dead = true; player.vy = -12; }});
        world.powerups.filter(near).forEach((p) => { if (collides(player, p)) { if (p.id === 'tarcza') player.shieldTimer = 300; if (p.id === 'strzalkaSkoku') player.jumpBoostTimer = 600; world.powerups.splice(world.powerups.indexOf(p), 1); }});
        world.checkpoints.filter(near).forEach(c => { if (collides(player, c)) { player.respawnX = c.x; player.respawnY = c.y - CHICKEN_SIZE; }});
        world.seeds.filter(near).forEach((s) => { if (collides(player, s)) { world.seeds.splice(world.seeds.indexOf(s), 1); player.score += 10; }});
        world.chicks.forEach(c => { if (collides(player, c)) { world.chicks = []; progress[currentLevel] = 1; try { localStorage.setItem('kokoszka_v13', JSON.stringify(progress)); } catch(e){} }});
    
        // Zapisz stan klawiszy na koniec klatki (Do wykrywania pojedynczego wciśnięcia)
        Object.keys(keys).forEach(k => prevKeys[k] = keys[k]);
    }

    // =========================================================================
    // MODUŁ 6: POTĘŻNY RENDERER
    // =========================================================================
    function drawTextOutline(text, x, y, size, color) { 
        ctx.font = `bold ${size}px 'Segoe UI', Arial`; ctx.textAlign = "left"; 
        ctx.strokeStyle = "#111"; ctx.lineWidth = 5; ctx.strokeText(text, x, y); 
        ctx.fillStyle = color; ctx.fillText(text, x, y); 
    }

    function draw() {
        // CZYŚCIMY EKRAN
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,800,600);

        if (gameState === "LOADING") { 
            drawTextOutline("KARMIENIE KUR...", 250, 300, 36, "white"); 
            return; 
        }

        if(assets['niebo']) ctx.drawImage(assets['niebo'], 0, 0, 800, 600);

        if (gameState === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,800,600);
            ctx.textAlign = "center"; drawTextOutline("KOKOSZKA PLATFORMER", 400, 100, 48, "#f1c40f");
            
            ['easy', 'medium', 'hard'].forEach((lv, i) => { 
                ctx.fillStyle = progress[lv] ? "#2ecc71" : "#e67e22"; 
                ctx.fillRect(280, 180 + i*80, 240, 60); 
                ctx.textAlign = "center"; 
                drawTextOutline(`${lv.toUpperCase()} (${progress[lv]}/1)`, 400, 218 + i*80, 24, "white"); 
            });
        } 
        else if (gameState === "PLAYING") {
            const vL = cameraX - 200, vR = cameraX + 1000; const isVis = (o) => o.x > vL && o.x < vR;
            
            // 1. Tło Paralaksa (Słońce i Drzewa)
            world.decos.filter(isVis || (d => d.id === 'slonce')).forEach(d => { 
                if (d.id === 'slonce') drawS(d.id, d.x - cameraX * 0.05, d.y, d.w, d.h); 
                else drawS(d.id, d.x-cameraX, d.y, d.w, d.h); 
            });
            
            // 2. Bloki Główne
            world.tiles.filter(isVis).forEach(t => drawS(t.id, t.x-cameraX, t.y, t.w, t.h));
            world.hazards.filter(isVis).forEach(h => drawS(h.id, h.x-cameraX, h.y, h.w, h.h));
            
            // 3. Woda (Przezroczysta)
            ctx.globalAlpha = 0.65; world.waters.filter(isVis).forEach(w => drawS('woda', w.x-cameraX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            
            // 4. Przedmioty
            world.seeds.filter(isVis).forEach(s => drawS('Ziarna', s.x-cameraX, s.y, s.w, s.h));
            world.powerups.filter(isVis).forEach(p => drawS(p.id, p.x-cameraX, p.y, p.w, p.h));
            world.checkpoints.filter(isVis).forEach(cp => drawS('checkPoint', cp.x-cameraX, cp.y, cp.w, cp.h));
            world.chicks.forEach(c => drawS('kurczak', c.x-cameraX, c.y, c.w, c.h));

            // 5. Kura Gracz
            ctx.save(); ctx.translate(player.x - cameraX + player.w/2, player.y + player.h/2); if (player.dir === -1) ctx.scale(-1, 1);
            
            let s = player.dead ? 'kuraNuggets' : (player.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!player.onGround && !player.dead) s = 'KuraSkok'; 
            if ((keys['w'] || keys[' ']) && !player.onGround && player.vy > 0 && player.glideFuel > 0) s = 'KuraSzybujaca'; 
            if (player.crouching) s = 'KuraKlucanie';
            
            drawS(s, -player.w/2, -player.h/2, player.w, player.h); 
            if(player.shieldTimer > 0) { ctx.globalAlpha = 0.5; drawS('tarcza', -player.w/2-10, -player.h/2-10, player.w+20, player.h+20); ctx.globalAlpha = 1; }
            ctx.restore();

            // 6. UI Góra
            drawS('zebatka', 720, 20, 60, 60); 
            drawTextOutline("PKT: " + player.score, 20, 50, 32, "white");
            
            let tY = 90;
            if(player.shieldTimer > 0) { drawS('zegar', 20, tY, 40, 40); drawS('tarcza', 65, tY+5, 30, 30); drawTextOutline(Math.ceil(player.shieldTimer/60)+"s", 105, tY+30, 24, "white"); tY += 50; }
            if(player.jumpBoostTimer > 0) { drawS('zegar', 20, tY, 40, 40); drawS('strzalkaSkoku', 65, tY+5, 30, 30); drawTextOutline(Math.ceil(player.jumpBoostTimer/60)+"s", 105, tY+30, 24, "white"); }
            
            // 7. Mobilne Joysticki
            if (isMobile) { 
                let jh = joysticks.horizontal; let jv = joysticks.vertical;
                ctx.globalAlpha = 0.8;
                drawS('poziomo', jh.x, jh.y, jh.w, jh.h); 
                drawS('skokk', jv.x, jv.y, jv.w, jv.h); 
                ctx.globalAlpha = 1.0;

                ctx.textAlign = "center";
                drawTextOutline("RUCH", jh.x + jh.w/2, jh.y - 15, 18, "white");
                drawTextOutline("SKOK / LOT", jv.x + jv.w/2, jv.y - 15, 18, "white");
                drawTextOutline("KUCANIE", jv.x + jv.w/2, jv.y + jv.h + 25, 18, mobileCrouchToggle ? "#2ecc71" : "white");
            }
            
            // 8. Menu Pauzy
            if (isPaused) { 
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,600); 
                if (pauseMenuState === "MAIN") {
                    ctx.textAlign = "center"; drawTextOutline("PAUZA", 400, 180, 56, "white");
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 280, 200, 60); drawTextOutline("WZNÓW", 400, 318, 24, "white");
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 360, 200, 60); drawTextOutline("USTAWIENIA", 400, 398, 24, "white");
                    ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 440, 200, 60); drawTextOutline("WYJDŹ", 400, 478, 24, "white");
                } else if (pauseMenuState === "SETTINGS") {
                    ctx.textAlign = "center"; drawTextOutline("USTAWIENIA", 400, 180, 56, "white");
                    ctx.fillStyle = "#e67e22"; ctx.fillRect(280, 320, 240, 60); drawTextOutline("RESET ZAPISU", 400, 358, 22, "white");
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(280, 460, 240, 60); drawTextOutline("WRÓĆ", 400, 498, 24, "white");
                }
            }
        }
        ctx.textAlign = "left"; drawTextOutline("v1.3", 10, 25, 18, "rgba(255,255,255,0.7)");
    }

    function drawS(n, x, y, w, h) { 
        if (assets[n] && assets[n].width > 10) ctx.drawImage(assets[n], x, y, w, h); 
    }
    
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);

</script>
