<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer v12 - Mega Update</title>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 4px solid #222; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // POWIĘKSZENIE 1.5x (Z 40 na 60 pikseli!)
    const TILE_SIZE = 60; 
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // ==========================================================
    // --- 1. SYSTEM GREEN SCREEN & ŁADOWANIE PLIKÓW ---
    // ==========================================================
    const assets = {};
    const basePaths = {
        'KuraStojaca': 'postac/KuraStojaca', 'KuraChodzaca': 'postac/KuraChodzaca', 
        'KuraSkok': 'postac/KuraSkok', 'KuraSzybujaca': 'postac/KuraSzybujaca', 
        'KuraKlucanie': 'postac/KuraKlucanie', 'kuraNuggets': 'postac/kuraNuggets', 'kurczak': 'postac/kurczak',
        
        'trawa': 'bloki/trawa', 'ziemia': 'bloki/ziemia', 'kamien': 'bloki/kamien', 
        'drewno': 'bloki/drewno', 'lod': 'bloki/lod', 'piasek': 'bloki/piasek', 
        'void': 'bloki/void', 'woda': 'bloki/woda',
        
        'lawa': 'hazard/lawa', 'kolec': 'hazard/kolec', 'blokkolcow': 'hazard/blokkolcow',
        
        'checkPoint': 'mechanika/checkPoint', 'portal': 'mechanika/portal', 
        'rura': 'mechanika/rura', 'Ziarna': 'mechanika/Ziarna', 
        'tarcza': 'mechanika/tarcza', 'strzalkaSkoku': 'mechanika/strzalkaSkoku',
        
        'niebo': 'dekoracje/niebo', 'slonce': 'dekoracje/slonce',  // USUNIĘTA CHMURA
        'kwiat': 'dekoracje/kwiat', 'krzak': 'dekoracje/krzak', 'krazkowocow': 'dekoracje/krazkowocow', 
        'liscie': 'dekoracje/liscie', 'maledrzewo': 'dekoracje/maledrzewo', 
        'duzedrzewo': 'dekoracje/duzedrzewo', 'samotnyKamien': 'dekoracje/samotnyKamien',
        
        'zebatka': 'ui/zebatka', 'zegar': 'ui/zegar'
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(basePaths).length;
    let gameState = "LOADING"; 
    let pauseMenuState = "MAIN";

    // Funkcja usuwająca szare tło (Green Screen)
    function applyGreenScreen(img) {
        let c = document.createElement('canvas');
        c.width = img.width || 60; c.height = img.height || 60;
        if(c.width === 0) return img;
        let cx = c.getContext('2d');
        cx.drawImage(img, 0, 0);
        try {
            let imgData = cx.getImageData(0, 0, c.width, c.height);
            let data = imgData.data;
            // Sprawdzamy kolor lewego górnego piksela (często to jest to szare tło)
            let bgR = data[0], bgG = data[1], bgB = data[2], bgA = data[3];
            
            // Jeśli kolor przypomina szary/srebrny
            if (bgA > 0 && Math.abs(bgR - bgG) < 25 && Math.abs(bgG - bgB) < 25 && bgR > 50 && bgR < 220) {
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.abs(data[i] - bgR) < 30 && Math.abs(data[i+1] - bgG) < 30 && Math.abs(data[i+2] - bgB) < 30) {
                        data[i+3] = 0; // Robi przezroczyste!
                    }
                }
                cx.putImageData(imgData, 0, 0);
                let newImg = new Image();
                newImg.src = c.toDataURL();
                return newImg;
            }
        } catch(e) {} 
        return img;
    }

    Object.keys(basePaths).forEach(name => {
        let basePath = basePaths[name];
        let attempts = [`${basePath}.png.png`, `${basePath}.png`];
        let attemptIndex = 0;
        let img = new Image();
        img.crossOrigin = "Anonymous"; // Ważne dla Green Screena na GitHubie

        const tryNext = () => {
            if (attemptIndex < attempts.length) {
                img.src = attempts[attemptIndex] + "?v=" + Date.now(); 
                attemptIndex++;
            } else {
                let c = document.createElement('canvas'); c.width = 60; c.height = 60; let cctx = c.getContext('2d');
                if (name.includes('trawa')) cctx.fillStyle = '#2ecc71'; 
                else if (name.includes('ziemia')) cctx.fillStyle = '#8e44ad'; 
                else if (name.includes('woda')) cctx.fillStyle = '#3498db'; 
                else if (name.includes('lawa')) cctx.fillStyle = '#e74c3c'; 
                else if (name.includes('Kura')) cctx.fillStyle = '#f1c40f'; 
                else cctx.fillStyle = '#7f8c8d'; 
                cctx.fillRect(0,0,60,60); 
                assets[name] = c; loadedCount++;
                if (loadedCount === totalAssets) gameState = "LOBBY";
            }
        };
        img.onload = () => { 
            // Odpalamy magię usuwania tła! (Oprócz tła nieba)
            if(name !== 'niebo') {
                assets[name] = applyGreenScreen(img); 
            } else {
                assets[name] = img;
            }
            loadedCount++; 
            if (loadedCount === totalAssets) gameState = "LOBBY"; 
        };
        img.onerror = tryNext; tryNext();
    });

    // ==========================================================
    // --- 2. ZMIENNE ---
    // ==========================================================
    let isPaused = false, currentLevel = "easy", cameraX = 0, keys = {};
    let progress = { easy: 0, medium: 0, hard: 0 };
    try { let saved = localStorage.getItem('kokoszka_v12'); if (saved) progress = JSON.parse(saved); } catch(e) {}

    let world = { tiles: [], hazards: [], checkpoints: [], chicks: [], waters: [], seeds: [], teleports: [], decos: [], powerups: [], lonelyStone: null };
    
    // Gracz jest 1.5x większy i szybszy!
    let player = { 
        x: 0, y: 0, w: 60, h: 60, vx: 0, vy: 0, speed: 8, onGround: false, crouching: false, dead: false, 
        respawnX: 0, respawnY: 0, deathTimer: 0, glideFuel: 0, inWater: false, score: 0, dir: 1, 
        shieldTimer: 0, jumpBoostTimer: 0 
    };

    // ==========================================================
    // --- 3. GENERATOR MAPY (Jeziora 2x1 do 4x1, bloki do dna) ---
    // ==========================================================
    function buildLevel(diff) {
        currentLevel = diff;
        let len = diff === 'easy' ? 1500 : (diff === 'medium' ? 3000 : 4500); // Mniej bloków, bo bloki są wielkie
        Object.keys(world).forEach(k => world[k] = []);
        
        let floorY = 420; // Podłoga niżej
        let gapCounter = 0;
        let safeZone = 15; 
        let isHard = diff === 'hard';
        let isMed = diff === 'medium';
        
        let hazardChance = isHard ? 0.15 : (isMed ? 0.08 : 0.02);
        let gapChance = isHard ? 0.08 : (isMed ? 0.03 : 0.0);

        // Dodajemy Słońce do dekoracji
        world.decos.push({x: 600, y: 50, w: 90, h: 90, id: 'slonce'});

        for (let i = 0; i < len; i++) {
            let x = i * TILE_SIZE;

            if (i < 15 || i > len - 15) {
                world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'trawa'});
                for(let dy = floorY + TILE_SIZE; dy < 1500; dy += TILE_SIZE) {
                    world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                }
                continue;
            }

            if (gapCounter > 0) {
                gapCounter--;
                world.hazards.push({x, y: 800, w: TILE_SIZE, h: TILE_SIZE, id: (Math.random() > 0.5 ? 'lawa' : 'void')});
                if (gapCounter === 0) safeZone = 3; 
                continue;
            }

            if (safeZone <= 0 && Math.random() < gapChance) {
                gapCounter = isHard ? Math.floor(Math.random() * 2) + 3 : 2; 
                continue;
            }

            if (safeZone > 0) safeZone--;

            // SYSTEM GENEROWANIA JEZIOR WODY (Szerokość 2-4 bloki)
            if (safeZone <= 0 && Math.random() < 0.05) {
                let waterWidth = Math.floor(Math.random() * 3) + 2; // Od 2 do 4
                for(let w = 0; w < waterWidth; w++) {
                    let wx = (i + w) * TILE_SIZE;
                    world.waters.push({x: wx, y: floorY + 15, w: TILE_SIZE, h: TILE_SIZE, id: 'woda'}); // Lekko wklęsłe
                    for(let dy = floorY + TILE_SIZE; dy < 1500; dy += TILE_SIZE) {
                        world.tiles.push({x: wx, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                    }
                }
                i += (waterWidth - 1); // Przeskakujemy kursor mapy
                safeZone = 2;
                continue;
            } 
            
            // ZWYKŁY LĄD
            world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'trawa'});
            for(let dy = floorY + TILE_SIZE; dy < 1500; dy += TILE_SIZE) {
                world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
            }

            // KWIATY I KRZAKI (Solidne, można skakać)
            if (Math.random() < 0.15) {
                let dec = (Math.random() > 0.5) ? 'krzak' : 'kwiat';
                world.tiles.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: dec}); 
            } 

            // DRZEWA (Dekoracje w tle - kura przez nie przenika!)
            if (Math.random() < 0.05) {
                if (Math.random() > 0.5) {
                    world.decos.push({x, y: floorY - 180, w: 120, h: 180, id: 'duzedrzewo'});
                } else {
                    world.decos.push({x, y: floorY - 120, w: 80, h: 120, id: 'maledrzewo'});
                }
            }

            if (safeZone <= 0 && Math.random() < hazardChance) {
                world.hazards.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: 'kolec'});
                safeZone = 2; 
            }

            if (i % 80 === 0) world.checkpoints.push({x, y: floorY - 80, w: TILE_SIZE, h: TILE_SIZE});
            if (i % 200 === 100) world.powerups.push({x, y: floorY - 200, w: 45, h: 45, id: 'tarcza'});
            if (i % 250 === 150) world.powerups.push({x, y: floorY - 200, w: 45, h: 45, id: 'strzalkaSkoku'});
            if (i % 12 === 0) world.seeds.push({x: x+15, y: floorY - 90, w: 30, h: 30});
            
            if (safeZone <= 0 && Math.random() < 0.1) {
                floorY += (Math.random() > 0.5 ? -TILE_SIZE : TILE_SIZE);
                if (floorY > 480) floorY = 480;
                if (floorY < 240) floorY = 240; 
                safeZone = 2; 
            }
        }
        
        player.x = 200; player.y = 300; player.respawnX = 200; player.respawnY = 300;
        player.vx = 0; player.vy = 0; player.score = 0; player.dead = false; 
        player.shieldTimer = 0; player.jumpBoostTimer = 0; player.glideFuel = 0; cameraX = 0;
        world.chicks.push({x: (len-5)*TILE_SIZE, y: 380, w: 60, h: 60});
        gameState = "PLAYING"; isPaused = false; pauseMenuState = "MAIN";
    }

    // ==========================================================
    // --- 4. STEROWANIE ---
    // ==========================================================
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    function handleClick(mx, my) {
        if (gameState === "LOBBY") {
            if (mx > 300 && mx < 500) {
                if (my > 200 && my < 250) buildLevel('easy');
                else if (my > 300 && my < 350) buildLevel('medium');
                else if (my > 400 && my < 450) buildLevel('hard');
            }
        } 
        else if (gameState === "PLAYING") {
            if (mx > 740 && my < 60 && !isPaused) {
                isPaused = true; pauseMenuState = "MAIN"; keys = {};
            } 
            else if (isPaused) {
                if (pauseMenuState === "MAIN") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) { isPaused = false; } 
                        else if (my > 410 && my < 460) { pauseMenuState = "SETTINGS"; } 
                        else if (my > 480 && my < 530) { gameState = "LOBBY"; isPaused = false; } 
                    }
                } 
                else if (pauseMenuState === "SETTINGS") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) { 
                            progress = { easy: 0, medium: 0, hard: 0 };
                            localStorage.setItem('kokoszka_v12', JSON.stringify(progress));
                            alert("Zapis gry usunięty!");
                        }
                        else if (my > 480 && my < 530) { pauseMenuState = "MAIN"; } 
                    }
                }
            }
        }
    }

    canvas.addEventListener("mousedown", e => {
        const r = canvas.getBoundingClientRect();
        handleClick((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
    });

    const mBtns = {
        left: {x: 20, y: 480, w: 70, h: 70, text: '⬅️'}, right: {x: 110, y: 480, w: 70, h: 70, text: '➡️'},
        down: {x: 65, y: 560, w: 70, h: 35, text: 'KUC'}, jump: {x: 710, y: 480, w: 70, h: 70, text: 'SKOK'},
        glide: {x: 620, y: 480, w: 70, h: 70, text: 'LOT'}
    };

    function handleTouches(e) {
        if(gameState === "PLAYING" && !isPaused) e.preventDefault();
        keys['a'] = false; keys['d'] = false; keys['s'] = false; keys['w'] = false; keys[' '] = false;
        
        const r = canvas.getBoundingClientRect();
        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && i === 0 && (gameState === "LOBBY" || isPaused || (tx > 740 && ty < 60))) handleClick(tx, ty);

            if (gameState === "PLAYING" && !isPaused) {
                if (tx>mBtns.left.x && tx<mBtns.left.x+mBtns.left.w && ty>mBtns.left.y && ty<mBtns.left.y+mBtns.left.h) keys['a'] = true;
                if (tx>mBtns.right.x && tx<mBtns.right.x+mBtns.right.w && ty>mBtns.right.y && ty<mBtns.right.y+mBtns.right.h) keys['d'] = true;
                if (tx>mBtns.down.x && tx<mBtns.down.x+mBtns.down.w && ty>mBtns.down.y && ty<mBtns.down.y+mBtns.down.h) keys['s'] = true;
                if (tx>mBtns.jump.x && tx<mBtns.jump.x+mBtns.jump.w && ty>mBtns.jump.y && ty<mBtns.jump.y+mBtns.jump.h) keys[' '] = true;
                if (tx>mBtns.glide.x && tx<mBtns.glide.x+mBtns.glide.w && ty>mBtns.glide.y && ty<mBtns.glide.y+mBtns.glide.h) keys['w'] = true;
            }
        }
    }

    if (isMobile) {
        canvas.addEventListener('touchstart', handleTouches, {passive: false});
        canvas.addEventListener('touchmove', handleTouches, {passive: false});
        canvas.addEventListener('touchend', handleTouches, {passive: false});
    }

    function collides(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    // ==========================================================
    // --- 5. FIZYKA (DOPASOWANA DO 1.5x SKALI) ---
    // ==========================================================
    function update() {
        if (gameState !== "PLAYING" || isPaused) return;
        cameraX += (player.x - 380 - cameraX) * 0.1; if (cameraX < 0) cameraX = 0;
        
        if (player.shieldTimer > 0) player.shieldTimer--; 
        if (player.jumpBoostTimer > 0) player.jumpBoostTimer--;
        
        if (player.dead) { player.vy += 0.8; player.y += player.vy; player.deathTimer++; if (player.deathTimer > 60) { player.dead = false; player.x = player.respawnX; player.y = player.respawnY; player.vy = 0; player.deathTimer = 0; player.h = 60; } return; }

        const near = (obj) => obj.x > cameraX - 100 && obj.x < cameraX + 900;
        const activeTiles = world.tiles.filter(near); 
        player.inWater = world.waters.filter(near).some(w => collides(player, w));

        // WIĘKSZY SKOK
        if (keys[' '] && !player.dead) {
            let p = player.jumpBoostTimer > 0 ? -26 : -20; 
            if (player.inWater) player.vy = -8; 
            else if (player.onGround) { player.vy = p; player.onGround = false; }
        }

        let spd = player.speed; let gr = activeTiles.find(t => collides({...player, y: player.y + 1}, t));
        if (gr) { if(gr.id === 'lod') spd *= 1.6; if(gr.id === 'piasek') spd *= 0.5; }

        if (keys['s'] && !player.inWater) { if (!player.crouching) { player.h = 36; player.y += 24; player.crouching = true; } } else if (player.crouching) { let tR = { x: player.x, y: player.y - 24, w: player.w, h: 60 }; if (!activeTiles.some(t => collides(tR, t))) { player.h = 60; player.y -= 24; player.crouching = false; } }

        player.vx = 0; if (keys['a']) { player.vx = -spd; player.dir = -1; } if (keys['d']) { player.vx = spd; player.dir = 1; } if (player.inWater) player.vx *= 0.6; player.x += player.vx;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vx > 0) player.x = t.x - player.w; if (player.vx < 0) player.x = t.x + t.w; }});

        // SPADOCHRON
        if (player.onGround) player.glideFuel = 50; 
        let isGliding = false;
        if (keys['w'] && !player.onGround && !player.inWater && player.glideFuel > 0) {
            if (player.vy > 1.0) player.vy = 1.0; 
            player.glideFuel--;
            isGliding = true;
        }
        
        if (!isGliding) {
            player.vy += player.inWater ? 0.3 : 0.95; // Przyspieszona grawitacja dla skali 1.5x
        }
        
        player.y += player.vy; player.onGround = false;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vy > 0) { player.y = t.y - player.h; player.vy = 0; player.onGround = true; } else if (player.vy < 0) { player.y = t.y + t.h; player.vy = 0; } }});

        if (player.y > 1000) player.dead = true;
        world.hazards.filter(near).forEach(h => { if (collides(player, h) && player.shieldTimer <= 0) { player.dead = true; player.vy = -12; }});
        
        world.powerups.filter(near).forEach((p) => { 
            if (collides(player, p)) { 
                if (p.id === 'tarcza') player.shieldTimer = 300; 
                if (p.id === 'strzalkaSkoku') player.jumpBoostTimer = 600; 
                world.powerups.splice(world.powerups.indexOf(p), 1); 
            }
        });
        
        world.checkpoints.filter(near).forEach(c => { if (collides(player, c)) { player.respawnX = c.x; player.respawnY = c.y - 60; }});
        world.seeds.filter(near).forEach((s) => { if (collides(player, s)) { world.seeds.splice(world.seeds.indexOf(s), 1); player.score += 10; }});
        world.chicks.forEach(c => { if (collides(player, c)) { world.chicks = []; progress[currentLevel] = 1; try { localStorage.setItem('kokoszka_v12', JSON.stringify(progress)); } catch(e){} }});
    }

    // ==========================================================
    // --- 6. RYSOWANIE ---
    // ==========================================================
    
    // Funkcja do rysowania tekstu z ładną, retro obwódką!
    function drawText(text, x, y, size, color) {
        ctx.font = `bold ${size}px Arial`;
        ctx.textAlign = "left";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 4;
        ctx.strokeText(text, x, y); // Obwódka
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);   // Wypełnienie
    }

    function draw() {
        if (gameState === "LOADING") {
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,800,600);
            let p = Math.round((loadedCount / totalAssets) * 100);
            ctx.fillStyle = "#444"; ctx.fillRect(200, 320, 400, 20);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(200, 320, 400 * (loadedCount / totalAssets), 20);
            drawText(`USUWANIE SZAREGO TŁA... ${p}%`, 220, 300, 24, "white");
            return;
        }

        // TŁO ZABLOKOWANE - Normalny rozmiar 800x600
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,800,600);
        if(assets['niebo'] && assets['niebo'].width > 50) { ctx.drawImage(assets['niebo'], 0, 0, 800, 600); }

        if (gameState === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,600);
            ctx.textAlign = "center"; drawText("KOKOSZKA: PERFEKCJA", 400, 100, 40, "white");
            ['easy', 'medium', 'hard'].forEach((lv, i) => {
                ctx.fillStyle = progress[lv] ? "#2ecc71" : "#e67e22"; ctx.fillRect(300, 200 + i*100, 200, 50);
                ctx.textAlign = "center"; drawText(`${lv.toUpperCase()} (${progress[lv]}/1)`, 400, 235 + i*100, 20, "white");
            });
        } 
        else if (gameState === "PLAYING") {
            const vL = cameraX - 120, vR = cameraX + 920; const isVis = (o) => o.x > vL && o.x < vR;

            // DRZEWA I SŁOŃCE Z TYŁU (PARALAKSA SŁOŃCA!)
            world.decos.filter(isVis || (d => d.id === 'slonce')).forEach(d => { 
                if (d.id === 'slonce') {
                    // Słońce podąża za kurą z efektem paralaksy
                    drawS(d.id, d.x - cameraX * 0.05, d.y, d.w, d.h); 
                } else {
                    drawS(d.id, d.x-cameraX, d.y, d.w, d.h); 
                }
            });
            
            // BLOKI
            world.tiles.filter(isVis).forEach(t => drawS(t.id, t.x-cameraX, t.y, t.w, t.h));
            world.hazards.filter(isVis).forEach(h => drawS(h.id, h.x-cameraX, h.y, h.w, h.h));
            
            ctx.globalAlpha = 0.6; world.waters.filter(isVis).forEach(w => drawS('woda', w.x-cameraX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            
            world.seeds.filter(isVis).forEach(s => drawS('Ziarna', s.x-cameraX, s.y, s.w, s.h));
            world.powerups.filter(isVis).forEach(p => drawS(p.id, p.x-cameraX, p.y, p.w, p.h));
            world.checkpoints.filter(isVis).forEach(cp => drawS('checkPoint', cp.x-cameraX, cp.y, cp.w, cp.h));
            world.chicks.forEach(c => drawS('kurczak', c.x-cameraX, c.y, c.w, c.h));

            // KURA (Wielkość 1.5x)
            ctx.save(); ctx.translate(player.x - cameraX + 30, player.y + player.h/2); if (player.dir === -1) ctx.scale(-1, 1);
            let s = player.dead ? 'kuraNuggets' : (player.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!player.onGround && !player.dead) s = 'KuraSkok'; if (keys['w'] && !player.onGround && player.glideFuel > 0) s = 'KuraSzybujaca'; if (player.crouching) s = 'KuraKlucanie';
            drawS(s, -30, -player.h/2, 60, player.h); 
            if(player.shieldTimer > 0) { ctx.globalAlpha = 0.4; drawS('tarcza', -40, -40, 80, 80); ctx.globalAlpha = 1; }
            ctx.restore();

            // INTERFEJS Z OBWÓDKAMI!
            drawS('zebatka', 730, 15, 55, 55); 
            drawText("PKT: " + player.score, 20, 45, 26, "white");
            
            let tY = 85;
            if(player.shieldTimer > 0) { 
                drawS('zegar', 20, tY, 35, 35); drawS('tarcza', 60, tY + 4, 28, 28); 
                drawText(Math.ceil(player.shieldTimer/60) + "s", 95, tY + 26, 22, "white"); tY += 45; 
            }
            if(player.jumpBoostTimer > 0) { 
                drawS('zegar', 20, tY, 35, 35); drawS('strzalkaSkoku', 60, tY + 4, 28, 28); 
                drawText(Math.ceil(player.jumpBoostTimer/60) + "s", 95, tY + 26, 22, "white"); 
            }

            if (isMobile) {
                ctx.globalAlpha = 0.5;
                Object.values(mBtns).forEach(b => {
                    ctx.fillStyle = "#fff"; ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.font = "bold 16px Arial";
                    ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2 + 6);
                });
                ctx.globalAlpha = 1.0;
            }

            if (isPaused) { 
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,600); 
                if (pauseMenuState === "MAIN") {
                    ctx.textAlign = "center"; drawText("PAUZA", 400, 100, 45, "white");
                    
                    drawText("PORADNIK STEROWANIA", 400, 150, 24, "#f1c40f");
                    drawText("➡️ W prawo: [D] | ⬅️ W lewo: [A]", 400, 195, 20, "white");
                    drawText("⬆️ Skok: [SPACJA] | ⬇️ Kucanie: [S]", 400, 235, 20, "white");
                    drawText("🪂 Spadochron (w locie): Przytrzymaj [W]", 400, 275, 20, "white");
                    
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 340, 200, 50); ctx.textAlign = "center"; drawText("WZNÓW", 400, 372, 22, "white");
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 410, 200, 50); drawText("USTAWIENIA", 400, 442, 22, "white");
                    ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 480, 200, 50); drawText("WYJDŹ DO LOBBY", 400, 512, 22, "white");
                } 
                else if (pauseMenuState === "SETTINGS") {
                    ctx.textAlign = "center"; drawText("USTAWIENIA", 400, 150, 45, "white");
                    ctx.fillStyle = "#e67e22"; ctx.fillRect(300, 340, 200, 50); drawText("ZRESETUJ ZAPIS GRY", 400, 372, 18, "white");
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(300, 480, 200, 50); drawText("WRÓĆ", 400, 512, 22, "white");
                }
            }
        }
        drawText("v12.0 Mega", 10, 25, 16, "rgba(255,255,255,0.8)");
    }

    function drawS(n, x, y, w, h) { 
        if (assets[n] && assets[n].width > 10) ctx.drawImage(assets[n], x, y, w, h); 
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
