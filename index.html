<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer v3.1 - Stable</title>
    <style>
        body { 
            margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { 
            background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 4px solid #222; 
            image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    
    const TILE_SIZE = 60; 
    const CHICKEN_SIZE = 90; 
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // ==========================================================
    // 1. BEZPIECZNE ŁADOWANIE GRAFIK I USUWANIE SIATKI
    // ==========================================================
    const assets = {};
    const basePaths = {
        'KuraStojaca': ['postac/KuraStojaca', 'KuraStojaca'], 'KuraChodzaca': ['postac/KuraChodzaca', 'KuraChodzaca'], 
        'KuraSkok': ['postac/KuraSkok', 'KuraSkok'], 'KuraSzybujaca': ['postac/KuraSzybujaca', 'KuraSzybujaca'], 
        'KuraKlucanie': ['postac/KuraKlucanie', 'KuraKlucanie'], 'kuraNuggets': ['postac/kuraNuggets', 'kuraNuggets'], 
        'kurczak': ['postac/kurczak', 'kurczak'],
        'trawa': ['bloki/trawa', 'trawa'], 'ziemia': ['bloki/ziemia', 'ziemia'], 'kamien': ['bloki/kamien', 'kamien'], 
        'drewno': ['bloki/drewno', 'drewno'], 'lod': ['bloki/lod', 'lod'], 'piasek': ['bloki/piasek', 'piasek'], 
        'woda': ['bloki/woda', 'woda'], 'lawa': ['hazard/lawa', 'lawa'], 'kolec': ['hazard/kolec', 'kolec'],
        'checkPoint': ['mechanika/checkPoint', 'checkPoint'], 'tarcza': ['mechanika/tarcza', 'tarcza'], 
        'strzalkaSkoku': ['mechanika/strzalkaSkoku', 'strzalkaSkoku'], 'Ziarna': ['mechanika/Ziarna', 'Ziarna'], 
        'niebo': ['dekoracje/niebo', 'niebo'], 'slonce': ['dekoracje/slonce', 'slonce'],
        'kwiat': ['dekoracje/kwiat', 'kwiat'], 'krzak': ['dekoracje/krzak', 'krzak'], 
        'maledrzewo': ['dekoracje/maledrzewo', 'maledrzewo'], 'duzedrzewo': ['dekoracje/duzedrzewo', 'duzedrzewo'], 
        'poziomo': ['poziomo', 'ui/poziomo'], 'skokk': ['skokk', 'ui/skokk'], 'zebatka': ['zebatka', 'ui/zebatka']
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(basePaths).length;
    let gameState = "LOADING"; 
    let pauseMenuState = "MAIN";

    // Prosta, ale skuteczna funkcja do usuwania szaro-białych pikseli (siatki tła)
    function applyGreenScreen(img, name) {
        if (name === 'niebo') return img;
        let c = document.createElement('canvas'); c.width = img.width || 60; c.height = img.height || 60;
        if (c.width === 0) return img;
        let cx = c.getContext('2d', {willReadFrequently: true}); cx.drawImage(img, 0, 0);
        try {
            let imgData = cx.getImageData(0, 0, c.width, c.height); let data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                if (a > 0) {
                    let isGrey = Math.abs(r-g)<20 && Math.abs(g-b)<20 && r>100 && r<220;
                    let isWhite = r>230 && g>230 && b>230;
                    if (isGrey || isWhite) data[i+3] = 0; // Usuń piksel siatki
                }
            }
            cx.putImageData(imgData, 0, 0);
            let newImg = new Image(); newImg.src = c.toDataURL(); return newImg;
        } catch(e) {} 
        return img;
    }

    Object.keys(basePaths).forEach(name => {
        let attempts = [`${basePaths[name][0]}.png.png`, `${basePaths[name][0]}.png`, `${basePaths[name][1]}.png.png`, `${basePaths[name][1]}.png`];
        let attemptIndex = 0; let img = new Image(); img.crossOrigin = "Anonymous";
        const tryNext = () => {
            if (attemptIndex < attempts.length) { img.src = attempts[attemptIndex] + "?v=" + Date.now(); attemptIndex++; } 
            else {
                let c = document.createElement('canvas'); c.width = 60; c.height = 60; let cx = c.getContext('2d');
                if(name==='zebatka'){cx.fillStyle='#f1c40f'; cx.fillRect(10,10,40,40);} else {cx.fillStyle='#ff00ff'; cx.fillRect(0,0,60,60);}
                assets[name] = c; loadedCount++; if (loadedCount === totalAssets) gameState = "LOBBY";
            }
        };
        img.onload = () => { assets[name] = applyGreenScreen(img, name); loadedCount++; if (loadedCount === totalAssets) gameState = "LOBBY"; };
        img.onerror = tryNext; tryNext();
    });

    // ==========================================================
    // 2. ZMIENNE GRY
    // ==========================================================
    let isPaused = false, currentLevel = "easy", cameraX = 0, keys = {}, prevKeys = {}, globalTicks = 0;
    let progress = { easy: 0, medium: 0, hard: 0 };
    try { let saved = localStorage.getItem('kokoszka_v31'); if (saved) progress = JSON.parse(saved); } catch(e) {}

    let world = { tiles: [], hazards: [], checkpoints: [], chicks: [], waters: [], seeds: [], decos: [], powerups: [], initPowerups: [], initSeeds: [] };
    
    let player = { 
        x: 0, y: 0, w: CHICKEN_SIZE, h: CHICKEN_SIZE, vx: 0, vy: 0, speed: 9, onGround: false, crouching: false, dead: false, 
        respawnX: 0, respawnY: 0, deathTimer: 0, glideFuel: 0, inWater: false, score: 0, dir: 1, shieldTimer: 0, jumpBoostTimer: 0, nuggetLanded: false 
    };

    let mobileCrouchToggle = false;

    // ==========================================================
    // 3. GENERATOR MAPY (Z NAPRAWIONYM POZYCJONOWANIEM)
    // ==========================================================
    function buildLevel(diff) {
        currentLevel = diff;
        let len = diff === 'easy' ? 1200 : (diff === 'medium' ? 2400 : 3600);
        Object.keys(world).forEach(k => world[k] = []);
        
        let floorY = 400; let gapCounter = 0; let safeZone = 15; 
        let isHard = diff === 'hard'; let isMed = diff === 'medium';
        let hazardChance = isHard ? 0.15 : (isMed ? 0.08 : 0.02);
        let gapChance = isHard ? 0.10 : (isMed ? 0.04 : 0.0);
        let inCave = false, isLavaCave = false, biomeLength = 0;

        world.decos.push({x: 600, y: 50, w: 100, h: 100, id: 'slonce'});

        for (let i = 0; i < len; i++) {
            let x = i * TILE_SIZE;

            if (biomeLength <= 0 && i > 30 && i < len - 30) {
                inCave = Math.random() < 0.25; isLavaCave = inCave && Math.random() < 0.4;
                biomeLength = Math.floor(Math.random() * 40) + 20; 
            }
            biomeLength--;

            if (inCave) {
                world.tiles.push({x, y: floorY - TILE_SIZE*5, w: TILE_SIZE, h: TILE_SIZE, id: 'kamien'});
                world.tiles.push({x, y: floorY - TILE_SIZE*6, w: TILE_SIZE, h: TILE_SIZE, id: 'kamien'});
            }

            if (i < 15 || i > len - 15) {
                world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'trawa'});
                for(let dy=floorY+TILE_SIZE; dy<=800; dy+=TILE_SIZE) world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                continue;
            }

            if (gapCounter > 0) {
                gapCounter--;
                world.hazards.push({x, y: 800, w: TILE_SIZE, h: TILE_SIZE, id: isLavaCave ? 'lawa' : (Math.random() > 0.5 ? 'lawa' : 'void')});
                if (gapCounter === 0) safeZone = 3; continue;
            }

            if (safeZone <= 0 && Math.random() < gapChance) { gapCounter = isHard ? Math.floor(Math.random() * 2) + 3 : 2; continue; }
            if (safeZone > 0) safeZone--;

            // Woda i Piasek
            if (safeZone <= 0 && !inCave && Math.random() < 0.05) {
                let wWidth = Math.floor(Math.random() * 3) + 2;
                world.tiles.push({x: i*TILE_SIZE, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'piasek'});
                for(let dy=floorY+TILE_SIZE; dy<=800; dy+=TILE_SIZE) world.tiles.push({x: i*TILE_SIZE, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                i++;
                for(let w = 0; w < wWidth; w++) {
                    let wx = (i + w) * TILE_SIZE;
                    world.waters.push({x: wx, y: floorY + 15, w: TILE_SIZE, h: TILE_SIZE, id: 'woda'}); 
                    for(let dy=floorY+TILE_SIZE; dy<=800; dy+=TILE_SIZE) world.tiles.push({x: wx, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                }
                i += wWidth;
                world.tiles.push({x: i*TILE_SIZE, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: 'piasek'});
                for(let dy=floorY+TILE_SIZE; dy<=800; dy+=TILE_SIZE) world.tiles.push({x: i*TILE_SIZE, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});
                safeZone = 2; continue;
            } 
            
            // Standardowa ziemia
            world.tiles.push({x, y: floorY, w: TILE_SIZE, h: TILE_SIZE, id: inCave ? 'kamien' : 'trawa'});
            for(let dy=floorY+TILE_SIZE; dy<=800; dy+=TILE_SIZE) world.tiles.push({x, y: dy, w: TILE_SIZE, h: TILE_SIZE, id: 'ziemia'});

            // Krzaki (Platformy) i Kwiaty (Ozdoby tła)
            if (!inCave && Math.random() < 0.15) {
                if (Math.random() > 0.5) world.tiles.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: 'krzak'}); 
                else world.decos.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: 'kwiat'}); 
            } 

            // Drzewa w tle
            if (!inCave && Math.random() < 0.05) {
                if (Math.random() > 0.5) world.decos.push({x, y: floorY - 200, w: TILE_SIZE * 2, h: TILE_SIZE * 3, id: 'duzedrzewo'});
                else world.decos.push({x, y: floorY - 140, w: TILE_SIZE * 1.5, h: TILE_SIZE * 2, id: 'maledrzewo'});
            }

            // Kolce
            if (safeZone <= 0 && Math.random() < hazardChance) {
                world.hazards.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, id: 'kolec'});
                safeZone = 2; 
            }

            // PRZEDMIOTY (Twardo na ziemi! Y przedmiotu = floorY - wysokość_przedmiotu)
            if (i > 10) {
                if (i % 80 === 0) world.checkpoints.push({x, y: floorY - TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE});
                if (i % 200 === 100) world.powerups.push({x: x+5, y: floorY - 50, w: 50, h: 50, id: 'tarcza'});
                if (i % 250 === 150) world.powerups.push({x: x+5, y: floorY - 50, w: 50, h: 50, id: 'strzalkaSkoku'});
                if (i % 12 === 0) world.seeds.push({x: x+15, y: floorY - 30, w: 30, h: 30});
            }
            
            if (safeZone <= 0 && Math.random() < 0.1) {
                floorY += (Math.random() > 0.5 ? -TILE_SIZE : TILE_SIZE);
                if (floorY > 480) floorY = 480; if (floorY < 240) floorY = 240; 
                safeZone = 2; 
            }
        }
        
        player.x = 300; player.y = 200; player.respawnX = 300; player.respawnY = 200; player.dead = false; 
        player.vx = 0; player.vy = 0; player.score = 0; player.shieldTimer = 0; player.jumpBoostTimer = 0; cameraX = 0;
        
        world.chicks.push({x: (len-5)*TILE_SIZE, y: 340, w: CHICKEN_SIZE, h: CHICKEN_SIZE});
        
        // Zapis do resetu
        world.initPowerups = JSON.parse(JSON.stringify(world.powerups));
        world.initSeeds = JSON.parse(JSON.stringify(world.seeds));

        gameState = "PLAYING"; isPaused = false; pauseMenuState = "MAIN";
    }

    // ==========================================================
    // 4. STEROWANIE I MOBILNE JOYSTICKI (Podniesione)
    // ==========================================================
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    function handleClick(mx, my) {
        if (gameState === "LOBBY") {
            if (mx > 300 && mx < 500) {
                if (my > 200 && my < 250) buildLevel('easy');
                else if (my > 300 && my < 350) buildLevel('medium');
                else if (my > 400 && my < 450) buildLevel('hard');
            }
        } 
        else if (gameState === "PLAYING") {
            if (mx > 740 && my < 60 && !isPaused) { isPaused = true; pauseMenuState = "MAIN"; keys = {}; } 
            else if (isPaused) {
                if (pauseMenuState === "MAIN") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) isPaused = false;
                        else if (my > 410 && my < 460) pauseMenuState = "SETTINGS";
                        else if (my > 480 && my < 530) { gameState = "LOBBY"; isPaused = false; } 
                    }
                } 
                else if (pauseMenuState === "SETTINGS") {
                    if (mx > 300 && mx < 500) {
                        if (my > 340 && my < 390) { progress = { easy: 0, medium: 0, hard: 0 }; localStorage.setItem('kokoszka_v31', JSON.stringify(progress)); alert("Reset!"); }
                        else if (my > 480 && my < 530) pauseMenuState = "MAIN"; 
                    }
                }
            }
        }
    }

    canvas.addEventListener("mousedown", e => {
        const r = canvas.getBoundingClientRect();
        handleClick((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
    });

    const joysticks = { horizontal: {x: 40, y: 400, w: 100, h: 100}, vertical: {x: 660, y: 400, w: 100, h: 100} };

    function handleTouches(e) {
        if(gameState === "PLAYING" && !isPaused) e.preventDefault();
        keys['a'] = false; keys['d'] = false; keys['w'] = false; keys[' '] = false; keys['s'] = mobileCrouchToggle;
        
        const r = canvas.getBoundingClientRect();
        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && (gameState === "LOBBY" || isPaused || (tx > 740 && ty < 60))) { handleClick(tx, ty); return; }

            if (gameState === "PLAYING" && !isPaused && isMobile) {
                let jh = joysticks.horizontal; let jv = joysticks.vertical;
                if (tx > jh.x - 20 && tx < jh.x + jh.w + 20 && ty > jh.y - 20 && ty < jh.y + jh.h + 20) {
                    if (tx < jh.x + jh.w / 2 - 10) keys['a'] = true; else if (tx > jh.x + jh.w / 2 + 10) keys['d'] = true;
                }
                if (tx > jv.x - 20 && tx < jv.x + jv.w + 20 && ty > jv.y - 20 && ty < jv.y + jv.h + 20) {
                    if (ty < jv.y + jv.h / 2) keys['w'] = true; 
                }
            }
        }

        // Kucanie - Przełącznik
        if (e.type === 'touchstart' && gameState === "PLAYING" && !isPaused && isMobile) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let tx = (e.changedTouches[i].clientX - r.left) * (canvas.width / r.width);
                let ty = (e.changedTouches[i].clientY - r.top) * (canvas.height / r.height);
                let jv = joysticks.vertical;
                if (tx > jv.x - 20 && tx < jv.x + jv.w + 20 && ty > jv.y - 20 && ty < jv.y + jv.h + 20 && ty > jv.y + jv.h / 2 + 10) {
                    mobileCrouchToggle = !mobileCrouchToggle; keys['s'] = mobileCrouchToggle;
                }
            }
        }
    }

    if (isMobile) {
        canvas.addEventListener('touchstart', handleTouches, {passive: false});
        canvas.addEventListener('touchmove', handleTouches, {passive: false});
        canvas.addEventListener('touchend', handleTouches, {passive: false});
    }

    function collides(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    // ==========================================================
    // 5. FIZYKA GRY I GRAWITACJA NUGGETSÓW
    // ==========================================================
    function update() {
        globalTicks++;
        if (gameState !== "PLAYING" || isPaused) return;
        cameraX += (player.x - 380 - cameraX) * 0.1; if (cameraX < 0) cameraX = 0;
        
        if (player.shieldTimer > 0) player.shieldTimer--; 
        if (player.jumpBoostTimer > 0) player.jumpBoostTimer--;
        
        const near = (obj) => obj.x > cameraX - 100 && obj.x < cameraX + 900;
        const activeTiles = world.tiles.filter(near); 
        player.inWater = world.waters.filter(near).some(w => collides(player, w));

        // ŚMIERĆ (Nuggetsy spadają na ziemię!)
        if (player.dead) { 
            if (!player.nuggetLanded) {
                player.vy += 1.2; player.y += player.vy; 
                activeTiles.forEach(t => { 
                    if (collides(player, t) && player.vy > 0) { player.y = t.y - player.h; player.vy = 0; player.nuggetLanded = true; }
                });
            }
            player.deathTimer++; 
            if (player.deathTimer > 60) { 
                player.dead = false; player.x = player.respawnX; player.y = player.respawnY; player.vy = 0; player.deathTimer = 0; player.h = CHICKEN_SIZE; 
                mobileCrouchToggle = false; keys['s'] = false; 
                // Reset itemów po śmierci
                world.powerups = JSON.parse(JSON.stringify(world.initPowerups));
                world.seeds = JSON.parse(JSON.stringify(world.initSeeds));
            } 
            return; 
        }

        let jumpPressed = ((keys['w'] && !prevKeys['w']) || (keys[' '] && !prevKeys[' ']));
        if (jumpPressed) {
            if (player.inWater) { player.vy = -10; player.onGround = false; player.glideFuel = 50; } 
            else if (player.onGround) { player.vy = player.jumpBoostTimer > 0 ? -28 : -22; player.onGround = false; player.glideFuel = 50; }
        }

        let spd = player.speed; let gr = activeTiles.find(t => collides({...player, y: player.y + 1}, t));
        if (gr) { if(gr.id === 'lod') spd *= 1.6; if(gr.id === 'piasek') spd *= 0.5; }

        if (keys['s'] && !player.inWater) { if (!player.crouching) { player.h = CHICKEN_SIZE*0.6; player.y += CHICKEN_SIZE*0.4; player.crouching = true; } } else if (player.crouching) { let tR = { x: player.x, y: player.y - CHICKEN_SIZE*0.4, w: player.w, h: CHICKEN_SIZE }; if (!activeTiles.some(t => collides(tR, t))) { player.h = CHICKEN_SIZE; player.y -= CHICKEN_SIZE*0.4; player.crouching = false; } }

        player.vx = 0; if (keys['a']) { player.vx = -spd; player.dir = -1; } if (keys['d']) { player.vx = spd; player.dir = 1; } if (player.inWater) player.vx *= 0.6; player.x += player.vx;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vx > 0) player.x = t.x - player.w; if (player.vx < 0) player.x = t.x + t.w; }});

        if (player.onGround) player.glideFuel = 50; 
        let isGliding = false;
        // Spadochron uruchamia się, gdy trzymasz skok, wisisz w powietrzu i SPADASZ
        if ((keys['w'] || keys[' ']) && !player.onGround && !player.inWater && player.glideFuel > 0 && player.vy > 0) {
            player.vy = 2.0; player.glideFuel--; isGliding = true;
        }
        
        if (!isGliding) { player.vy += player.inWater ? 0.4 : 1.2; } 
        
        player.y += player.vy; player.onGround = false;
        activeTiles.forEach(t => { if (collides(player, t)) { if (player.vy > 0) { player.y = t.y - player.h; player.vy = 0; player.onGround = true; } else if (player.vy < 0) { player.y = t.y + t.h; player.vy = 0; } }});

        if (player.y > 1000) { player.dead = true; player.nuggetLanded = false; player.vy = -12; player.y -= 10; }
        
        // Zmniejszony Hitbox Kolca (Tylko górna część kolca)
        world.hazards.filter(near).forEach(h => { 
            let hitY = h.id === 'kolec' ? h.y + h.h * 0.4 : h.y; let hitH = h.id === 'kolec' ? h.h * 0.6 : h.h;
            if (collides(player, {x: h.x, y: hitY, w: h.w, h: hitH}) && player.shieldTimer <= 0) { player.dead = true; player.nuggetLanded = false; player.vy = -12; player.y -= 10; }
        });
        
        world.powerups.filter(near).forEach((p, index) => { if (collides(player, p)) { if (p.id === 'tarcza') player.shieldTimer = 300; if (p.id === 'strzalkaSkoku') player.jumpBoostTimer = 600; world.powerups.splice(index, 1); }});
        world.checkpoints.filter(near).forEach(c => { if (collides(player, c)) { player.respawnX = c.x; player.respawnY = c.y - CHICKEN_SIZE; }});
        world.seeds.filter(near).forEach((s, index) => { if (collides(player, s)) { world.seeds.splice(index, 1); player.score += 10; }});
        world.chicks.forEach(c => { if (collides(player, c)) { world.chicks = []; progress[currentLevel] = 1; try { localStorage.setItem('kokoszka_v31', JSON.stringify(progress)); } catch(e){} setTimeout(()=> { gameState="LOBBY"; }, 2000); }});
        
        Object.keys(keys).forEach(k => prevKeys[k] = keys[k]);
    }

    // ==========================================================
    // 6. RENDEROWANIE (Z ŁATANIEM DZIUR W ZIEMI)
    // ==========================================================
    function drawTextOutline(text, x, y, size, color) { ctx.font = `bold ${size}px Arial`; ctx.textAlign = "center"; ctx.strokeStyle = "black"; ctx.lineWidth = 4; ctx.strokeText(text, x, y); ctx.fillStyle = color; ctx.fillText(text, x, y); }

    function draw() {
        if (gameState === "LOADING") { ctx.fillStyle = "#111"; ctx.fillRect(0,0,800,600); drawTextOutline("KARMIENIE KUR...", 400, 300, 30, "white"); return; }

        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,800,600);
        if(assets['niebo']) ctx.drawImage(assets['niebo'], 0, 0, 800, 600);

        if (gameState === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,600);
            drawTextOutline("KOKOSZKA PLATFORMER", 400, 100, 40, "white");
            ['easy', 'medium', 'hard'].forEach((lv, i) => { ctx.fillStyle = progress[lv] ? "#2ecc71" : "#e67e22"; ctx.fillRect(300, 200 + i*100, 200, 50); drawTextOutline(`${lv.toUpperCase()} (${progress[lv]}/1)`, 400, 235 + i*100, 20, "white"); });
        } 
        else if (gameState === "PLAYING") {
            const vL = cameraX - 120, vR = cameraX + 920; const isVis = (o) => o.x > vL && o.x < vR;
            
            world.decos.filter(isVis || (d => d.id === 'slonce')).forEach(d => { if (d.id === 'slonce') drawS(d.id, d.x - cameraX * 0.05, d.y, d.w, d.h); else drawS(d.id, d.x-cameraX, d.y, d.w, d.h); });
            
            // SYSTEM ŁATANIA DZIUR: Rysujemy lity kolor pod blokiem przed narysowaniem bloku
            world.tiles.filter(isVis).forEach(t => { 
                if(t.id === 'ziemia' || t.id === 'trawa' || t.id === 'kamien' || t.id === 'piasek') {
                    ctx.fillStyle = (t.id === 'kamien') ? '#333' : (t.id === 'piasek' ? '#d35400' : '#5c3a21');
                    ctx.fillRect(Math.floor(t.x - cameraX), Math.floor(t.y), t.w + 1, t.h + 1); // +1 łata przerwy na ułamek piksela
                }
                drawS(t.id, t.x-cameraX, t.y, t.w, t.h); 
            });
            
            world.hazards.filter(isVis).forEach(h => drawS(h.id, h.x-cameraX, h.y, h.w, h.h));
            ctx.globalAlpha = 0.6; world.waters.filter(isVis).forEach(w => drawS('woda', w.x-cameraX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            world.seeds.filter(isVis).forEach(s => drawS('Ziarna', s.x-cameraX, s.y, s.w, s.h));
            world.powerups.filter(isVis).forEach(p => drawS(p.id, p.x-cameraX, p.y, p.w, p.h));
            world.checkpoints.filter(isVis).forEach(cp => drawS('checkPoint', cp.x-cameraX, cp.y, cp.w, cp.h));
            world.chicks.forEach(c => drawS('kurczak', c.x-cameraX, c.y, c.w, c.h));

            // Kura
            ctx.save(); ctx.translate(player.x - cameraX + player.w/2, player.y + player.h/2); if (player.dir === -1) ctx.scale(-1, 1);
            let s = player.dead ? 'kuraNuggets' : (player.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!player.onGround && !player.dead) s = 'KuraSkok'; if ((keys['w']||keys[' ']) && !player.onGround && player.glideFuel > 0 && player.vy > 0) s = 'KuraSzybujaca'; if (player.crouching) s = 'KuraKlucanie';
            drawS(s, -player.w/2, -player.h/2, player.w, player.h); 
            if(player.shieldTimer > 0) { ctx.globalAlpha = 0.4; drawS('tarcza', -player.w/2-10, -player.h/2-10, player.w+20, player.h+20); ctx.globalAlpha = 1; }
            ctx.restore();

            drawS('zebatka', 730, 15, 55, 55); 
            ctx.textAlign = "left"; drawTextOutline("PKT: " + player.score, 20, 45, 26, "white");
            let tY = 85;
            if(player.shieldTimer > 0) { drawS('tarcza', 20, tY, 30, 30); drawTextOutline(Math.ceil(player.shieldTimer/60) + "s", 65, tY + 22, 22, "white"); tY += 40; }
            if(player.jumpBoostTimer > 0) { drawS('strzalkaSkoku', 20, tY, 30, 30); drawTextOutline(Math.ceil(player.jumpBoostTimer/60) + "s", 65, tY + 22, 22, "white"); }

            if (isMobile) { 
                let jh = joysticks.horizontal; let jv = joysticks.vertical;
                drawS('poziomo', jh.x, jh.y, jh.w, jh.h); drawS('skokk', jv.x, jv.y, jv.w, jv.h); 
                ctx.textAlign = "center"; drawTextOutline("RUCH", jh.x + jh.w/2, jh.y - 10, 16, "white"); drawTextOutline("SKOK / LOT", jv.x + jv.w/2, jv.y - 10, 16, "white");
                drawTextOutline("KUCANIE", jv.x + jv.w/2, jv.y + jv.h + 20, 16, mobileCrouchToggle ? "#2ecc71" : "white");
            }

            if (isPaused) { 
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,600); 
                if (pauseMenuState === "MAIN") {
                    ctx.textAlign = "center"; drawTextOutline("PAUZA", 400, 150, 45, "white"); ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 300, 200, 50); drawTextOutline("WZNÓW", 400, 332, 22, "white");
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 380, 200, 50); drawTextOutline("USTAWIENIA", 400, 412, 22, "white"); ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 460, 200, 50); drawTextOutline("WYJDŹ", 400, 492, 22, "white");
                } else if (pauseMenuState === "SETTINGS") {
                    ctx.textAlign = "center"; drawTextOutline("USTAWIENIA", 400, 150, 45, "white"); ctx.fillStyle = "#e67e22"; ctx.fillRect(300, 340, 200, 50); drawTextOutline("RESET ZAPISU", 400, 372, 20, "white");
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(300, 480, 200, 50); drawTextOutline("WRÓĆ", 400, 512, 22, "white");
                }
            }
            if (world.chicks.length === 0) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,800,600); ctx.textAlign = "center"; drawTextOutline("URATOWANO!", 400, 300, 50, "#f1c40f"); }
        }
        ctx.textAlign = "left"; drawTextOutline("v3.1 Stable", 10, 25, 16, "rgba(255,255,255,0.8)");
    }

    function drawS(n, x, y, w, h) { if (assets[n] && assets[n].width > 10) ctx.drawImage(assets[n], x, y, w, h); }
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
