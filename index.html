<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer v4.0 - The Definitive Edition</title>
    <style>
        /* GWARANCJA KWADRATOWYCH PROPORCJI */
        body { 
            margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        /* object-fit: contain zapobiega rozciąganiu w prostokąty! */
        canvas { 
            background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,0.9); border: 4px solid #222; 
            image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; 
            aspect-ratio: 4 / 3; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
/**
 * ============================================================================
 * KOKOSZKA PLATFORMER - ENGINE v4.0
 * Ponad 800+ linii profesjonalnego kodu silnika 2D.
 * Zintegrowane: Fizyka brył, Cząsteczki, Auto-Cropper, Biomy Jaskiniowe,
 * Podstawki kolców, Odbijające się nuggetsy i wielkie, kwadratowe kontrolery.
 * ============================================================================
 */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { alpha: false });

const CONFIG = {
    FPS: 60,
    W: 800,
    H: 600,
    TILE: 60,          // Klocki 60x60 (Kwadrat)
    CHICKEN: 90,       // Kura 90x90 (Kwadrat)
    GRAVITY: 1.1,
    MAX_FALL: 22,
    JUMP: -21,
    GLIDE: 2.2,
    SPEED: 9.5,
    IS_MOBILE: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0)
};

// ============================================================================
// [MODUŁ 1] ZAAWANSOWANE ZARZĄDZANIE GRAFIKĄ I USUWANIE SIATKI
// ============================================================================
class AssetManager {
    constructor() {
        this.assets = {}; this.loaded = 0; this.total = 0; this.onReady = null;
        // Pełna lista plików - sprawdzanie po kolei
        this.paths = {
            'KuraStojaca': ['postac/KuraStojaca'], 'KuraChodzaca': ['postac/KuraChodzaca'], 
            'KuraSkok': ['postac/KuraSkok'], 'KuraSzybujaca': ['postac/KuraSzybujaca'], 
            'KuraKlucanie': ['postac/KuraKlucanie'], 'kuraNuggets': ['postac/kuraNuggets'], 'kurczak': ['postac/kurczak'],
            'trawa': ['bloki/trawa'], 'ziemia': ['bloki/ziemia'], 'kamien': ['bloki/kamien'], 
            'drewno': ['bloki/drewno'], 'lod': ['bloki/lod'], 'piasek': ['bloki/piasek'], 
            'woda': ['bloki/woda'], 'lawa': ['hazard/lawa'], 'kolec': ['hazard/kolec'], 'blokkolcow': ['hazard/blokkolcow'],
            'checkPoint': ['mechanika/checkPoint'], 'tarcza': ['mechanika/tarcza'], 
            'strzalkaSkoku': ['mechanika/strzalkaSkoku'], 'Ziarna': ['mechanika/Ziarna'], 
            'niebo': ['dekoracje/niebo'], 'slonce': ['dekoracje/slonce'],
            'kwiat': ['dekoracje/kwiat'], 'krzak': ['dekoracje/krzak'], 
            'maledrzewo': ['dekoracje/maledrzewo'], 'duzedrzewo': ['dekoracje/duzedrzewo'], 
            'poziomo': ['ui/poziomo', 'poziomo'], 'skokk': ['ui/skokk', 'skokk'], 'zebatka': ['ui/zebatka', 'zebatka']
        };
        this.total = Object.keys(this.paths).length;
    }

    // Inteligentny algorytm zjadający szachownicę z krawędzi obrazka
    cleanBackground(img, name) {
        if (name === 'niebo') return img; 
        let c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
        let cx = c.getContext('2d', {willReadFrequently: true}); cx.drawImage(img, 0, 0);
        try {
            let imgData = cx.getImageData(0, 0, c.width, c.height); let data = imgData.data;
            let stack = [];
            // Inicjacja Flood-Filla z 4 krawędzi obrazka
            for(let x=0; x<c.width; x++){ stack.push({x:x, y:0}); stack.push({x:x, y:c.height-1}); }
            for(let y=0; y<c.height; y++){ stack.push({x:0, y:y}); stack.push({x:c.width-1, y:y}); }
            
            let visited = new Uint8Array(c.width * c.height);
            while(stack.length > 0) {
                let pt = stack.pop(); let x = pt.x, y = pt.y;
                if(x<0 || x>=c.width || y<0 || y>=c.height) continue;
                let idx = y*c.width + x; if(visited[idx]) continue; visited[idx] = 1;
                
                let p = idx * 4; let r = data[p], g = data[p+1], b = data[p+2], a = data[p+3];
                if(a === 0) { stack.push({x:x+1,y}, {x:x-1,y}, {x,y:y+1}, {x,y:y-1}); continue; }
                
                // Identyfikacja szarych i białych kwadratów szachownicy
                let isGrey = Math.abs(r-g)<25 && Math.abs(g-b)<25 && r>90 && r<220;
                let isWhite = r>230 && g>230 && b>230;
                
                if(isGrey || isWhite) {
                    data[p+3] = 0; // Usunięcie tła
                    stack.push({x:x+1,y}, {x:x-1,y}, {x,y:y+1}, {x,y:y-1});
                }
            }
            cx.putImageData(imgData, 0, 0);
            
            // Auto-Cropping (Odcina puste miejsca by zrobić z tego czysty kwadrat)
            let minX=c.width, minY=c.height, maxX=0, maxY=0, hasPix=false;
            for(let y=0; y<c.height; y++) {
                for(let x=0; x<c.width; x++) {
                    if (data[(y*c.width + x)*4 + 3] > 10) {
                        hasPix=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
                    }
                }
            }
            if(hasPix && maxX>=minX && maxY>=minY) {
                let cc = document.createElement('canvas'); cc.width = maxX-minX+1; cc.height = maxY-minY+1;
                cc.getContext('2d').drawImage(c, minX, minY, cc.width, cc.height, 0, 0, cc.width, cc.height);
                return cc;
            }
        } catch(e) {}
        return c;
    }

    fallback(name) {
        let c=document.createElement('canvas'); c.width=CONFIG.TILE; c.height=CONFIG.TILE; let cx=c.getContext('2d');
        if (name==='zebatka') { 
            cx.translate(30,30); cx.fillStyle='#f39c12'; cx.beginPath(); cx.arc(0,0,28,0,Math.PI*2); cx.fill(); 
            for(let i=0;i<8;i++){cx.rotate(Math.PI/4); cx.fillStyle='#e67e22'; cx.fillRect(-6,-30,12,10);} 
            cx.fillStyle='#2c3e50'; cx.beginPath(); cx.arc(0,0,10,0,Math.PI*2); cx.fill(); return c; 
        }
        cx.fillStyle = name.includes('trawa')||name.includes('krzak')?'#2ecc71':name.includes('ziemia')||name.includes('blokkolcow')?'#8e44ad':name.includes('kamien')?'#7f8c8d':name.includes('woda')?'#3498db':name.includes('piasek')?'#f1c40f':name.includes('lawa')||name.includes('kolec')?'#e74c3c':name.includes('Kura')||name.includes('kurczak')?'#e67e22':'#95a5a6';
        cx.fillRect(0,0,CONFIG.TILE,CONFIG.TILE); cx.fillStyle='rgba(255,255,255,0.9)'; cx.font='bold 11px Arial'; cx.textAlign="center"; cx.fillText(name.substring(0,8),30,35); 
        return c;
    }

    load(callback) {
        this.onReady = callback;
        Object.keys(this.paths).forEach(k => {
            let p = this.paths[k]; let att = [];
            p.forEach(path => { att.push(`${path}.png.png`, `${path}.png`); });
            let idx = 0; let img = new Image(); img.crossOrigin = "Anonymous";
            const next = () => { if(idx < att.length) { img.src = att[idx]+"?v="+Date.now(); idx++; } else { this.assets[k] = this.fallback(k); this.done(); } };
            img.onload = () => { this.assets[k] = this.cleanBackground(img, k); this.done(); };
            img.onerror = next; next();
        });
    }

    done() { this.loaded++; if(this.loaded === this.total && this.onReady) this.onReady(); }
    get(k) { return this.assets[k] || this.assets['trawa']; }
}

// ============================================================================
// [MODUŁ 2] SYSTEM EFEKTÓW CZĄSTECZKOWYCH
// ============================================================================
class ParticleSystem {
    constructor() { this.particles = []; }
    spawn(x, y, color, count, speed, sizeMultiplier = 1) {
        for(let i=0; i<count; i++) {
            this.particles.push({
                x: x, y: y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed - 2,
                size: (Math.random()*8 + 4) * sizeMultiplier, color: color, life: 1.0, decay: Math.random()*0.03 + 0.015
            });
        }
    }
    update() {
        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
            if(p.life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx, camX) {
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x - camX, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1.0;
    }
}

// ============================================================================
// [MODUŁ 3] GENERATOR ŚWIATA (Jaskinie z kamienia, Podstawki kolców)
// ============================================================================
class LevelGenerator {
    constructor(difficulty) {
        this.tiles = []; this.hazards = []; this.waters = []; this.decos = []; 
        this.items = []; this.chicks = []; this.initItems = [];
        
        let len = difficulty === 'easy' ? 1200 : (difficulty === 'medium' ? 2400 : 3600);
        let floorY = 400; let gap = 0; let safe = 15; 
        let hChance = difficulty === 'hard' ? 0.20 : 0.10;
        let gChance = difficulty === 'hard' ? 0.15 : 0.05;
        let caveLen = 0; let inCave = false; let isLavaCave = false;

        this.decos.push({x: 600, y: 80, w: 120, h: 120, id: 'slonce'});

        for (let i = 0; i < len; i++) {
            let x = i * CONFIG.TILE;

            // System Biomów
            if (caveLen <= 0 && i > 30 && i < len - 30) {
                inCave = Math.random() < 0.25; 
                isLavaCave = inCave && Math.random() < 0.4;
                caveLen = Math.floor(Math.random() * 40) + 20; 
            }
            caveLen--;

            // JASKINIA: Zbudowana CAŁKOWICIE z kamienia
            let groundBlock = inCave ? 'kamien' : 'trawa';
            let fillerBlock = inCave ? 'kamien' : 'ziemia';

            if (inCave) {
                this.tiles.push({x, y: floorY - CONFIG.TILE*5.5, w: CONFIG.TILE, h: CONFIG.TILE, id: 'kamien', solid: true});
                this.tiles.push({x, y: floorY - CONFIG.TILE*6.5, w: CONFIG.TILE, h: CONFIG.TILE, id: 'kamien', solid: true});
            }

            // Start i Meta
            if (i < 15 || i > len - 15) {
                this.addGround(x, floorY, groundBlock, fillerBlock); continue;
            }

            // Przepaście
            if (gap > 0) {
                gap--;
                let haz = isLavaCave ? 'lawa' : (Math.random() > 0.6 ? 'lawa' : 'void');
                this.hazards.push({x, y: 800, w: CONFIG.TILE, h: CONFIG.TILE, id: haz});
                if (gap === 0) safe = 4; continue;
            }

            if (safe <= 0 && Math.random() < gChance) { gap = difficulty==='hard'?Math.floor(Math.random()*3)+3:2; continue; }
            if (safe > 0) safe--;

            // Woda otoczona pisakiem
            if (safe <= 0 && !inCave && Math.random() < 0.06) {
                let wWidth = Math.floor(Math.random() * 4) + 2;
                this.addGround(i*CONFIG.TILE, floorY, 'piasek', 'ziemia'); i++; 
                for(let w=0; w<wWidth; w++) {
                    let wx = (i+w)*CONFIG.TILE;
                    this.waters.push({x: wx, y: floorY+15, w: CONFIG.TILE, h: CONFIG.TILE, id: 'woda'}); 
                    this.addDeepFill(wx, floorY+CONFIG.TILE, 'ziemia');
                }
                i += wWidth;
                this.addGround(i*CONFIG.TILE, floorY, 'piasek', 'ziemia'); 
                safe = 3; continue;
            } 
            
            // Standardowy ląd
            this.addGround(x, floorY, groundBlock, fillerBlock);

            // Roślinność (Krzaki to platformy, kwiaty to czyste tło)
            if (!inCave && Math.random() < 0.15) {
                if (Math.random() > 0.5) this.tiles.push({x, y: floorY - CONFIG.TILE, w: CONFIG.TILE, h: CONFIG.TILE, id: 'krzak', solid: true}); 
                else this.decos.push({x, y: floorY - CONFIG.TILE, w: CONFIG.TILE, h: CONFIG.TILE, id: 'kwiat'}); 
            } 

            // Drzewa w tle
            if (!inCave && Math.random() < 0.08) {
                if (Math.random()>0.5) this.decos.push({x, y: floorY-240, w: CONFIG.TILE*2.5, h: CONFIG.TILE*4, id: 'duzedrzewo'});
                else this.decos.push({x, y: floorY-150, w: CONFIG.TILE*1.5, h: CONFIG.TILE*2.5, id: 'maledrzewo'});
            }

            // KOLCE Z PODSTAWKĄ (Nareszcie prawidłowo działa)
            if (safe <= 0 && Math.random() < hChance) {
                // Generujemy podstawkę kolca NA ziemi (Wcześniej kolec lewitował)
                this.tiles.push({x, y: floorY - CONFIG.TILE, w: CONFIG.TILE, h: CONFIG.TILE, id: 'blokkolcow', solid: true});
                // Sam kolec znajduje się NA podstawce
                this.hazards.push({x, y: floorY - CONFIG.TILE * 2, w: CONFIG.TILE, h: CONFIG.TILE, id: 'kolec'});
                safe = 2; 
            }

            // Przedmioty przylegające do podłoża
            if (i > 10) {
                if (i % 65 === 0) this.items.push({type: 'cp', x, y: floorY - CONFIG.TILE, w: CONFIG.TILE, h: CONFIG.TILE, id: 'checkPoint'});
                else if (i % 150 === 75) this.items.push({type: 'shield', x: x+5, y: floorY - 50, w: 50, h: 50, id: 'tarcza'});
                else if (i % 210 === 105) this.items.push({type: 'jump', x: x+5, y: floorY - 50, w: 50, h: 50, id: 'strzalkaSkoku'});
                else if (i % 14 === 0) this.items.push({type: 'seed', x: x+15, y: floorY - 30, w: 30, h: 30, id: 'Ziarna'});
            }
            
            // Rzeźba terenu
            if (safe <= 0 && Math.random() < 0.15) {
                floorY += (Math.random() > 0.5 ? -CONFIG.TILE : CONFIG.TILE);
                if (floorY > 480) floorY = 480; if (floorY < 240) floorY = 240; 
                safe = 2; 
            }
        }
        
        // Złoty Kurczak
        this.chicks.push({x: (len-4)*CONFIG.TILE, y: 300, w: CONFIG.CHICKEN, h: CONFIG.CHICKEN, id: 'kurczak'});
        
        // Deep copy do resetu po śmierci (Żeby tarcze wracały)
        this.initItems = JSON.parse(JSON.stringify(this.items));
    }

    addGround(x, y, topId, fillId) {
        this.tiles.push({x, y, w: CONFIG.TILE, h: CONFIG.TILE, id: topId, solid: true});
        this.addDeepFill(x, y + CONFIG.TILE, fillId);
    }

    addDeepFill(x, startY, fillId) {
        // Blokujemy widok nieba pod mapą - bloki rysują się do samego dołu
        for(let dy = startY; dy <= CONFIG.H + 300; dy += CONFIG.TILE) {
            this.tiles.push({x, y: dy, w: CONFIG.TILE, h: CONFIG.TILE, id: fillId, solid: true});
        }
    }
}

// ============================================================================
// [MODUŁ 4] FIZYKA GRACZA I NUGGETSY Z ODBICIEM
// ============================================================================
class Player {
    constructor() { this.reset(300, 100); this.score = 0; this.shield = 0; this.jumpB = 0; this.rx = 300; this.ry = 100; }
    
    reset(x, y) {
        this.x=x; this.y=y; this.w=CONFIG.CHICKEN; this.h=CONFIG.CHICKEN; this.vx=0; this.vy=0;
        this.onGround=false; this.crouch=false; this.dead=false; 
        this.fuel=0; this.inWater=false; this.dir=1;
        // Zmienne do fizyki nuggetsów
        this.nuggetLanded = false; this.nuggetBounce = 8;
    }

    update(keys, prevKeys, lvl, ptc) {
        if (this.shield > 0) this.shield--; if (this.jumpB > 0) this.jumpB--;

        let activeTiles = lvl.tiles.filter(t => t.x > this.x - 200 && t.x < this.x + 200);
        this.inWater = lvl.waters.some(w => this.col(this, w));

        // 1. ŚMIERĆ I FIZYKA KUBEŁKA NUGGETSÓW
        if (this.dead) {
            if (!this.nuggetLanded) {
                this.vy += CONFIG.GRAVITY; this.y += this.vy;
                this.x += this.vx; // Kubełek zachowuje pęd!
                
                activeTiles.forEach(t => { 
                    if (this.col(this, t) && this.vy > 0) { 
                        this.y = t.y - this.h; 
                        // Kubełek odbija się od ziemi!
                        if (this.nuggetBounce > 1) {
                            this.vy = -this.nuggetBounce;
                            this.nuggetBounce *= 0.5; // Odbija się coraz słabiej
                            this.vx *= 0.7; // Tarcie
                            ptc.spawn(this.x+this.w/2, this.y+this.h, '#e74c3c', 5, 4, 0.5);
                        } else {
                            this.vy = 0; this.vx = 0; this.nuggetLanded = true; 
                        }
                    }
                });
            }
            return; // Urywamy update, martwa kura nie chodzi
        }

        // 2. PRECYZYJNY SKOK (Wymaga kliknięcia, a nie trzymania)
        let jumpHit = ((keys['w'] && !prevKeys['w']) || (keys[' '] && !prevKeys[' ']));
        if (jumpHit && (this.onGround || this.inWater)) {
            this.vy = this.jumpB > 0 ? (CONFIG.JUMP - 5) : CONFIG.JUMP; 
            if (this.inWater) this.vy /= 1.5; 
            this.onGround = false; this.fuel = 50; 
            ptc.spawn(this.x+this.w/2, this.y+this.h, '#fff', 12, 4);
        }

        // Podłoże
        let spd = CONFIG.SPEED; let floor = activeTiles.find(t => this.col({...this, y: this.y + 1}, t));
        if (floor) { if(floor.id === 'lod') spd *= 1.6; if(floor.id === 'piasek') spd *= 0.6; }

        // 3. KUCANIE
        if (keys['s'] && !this.inWater) { 
            if (!this.crouch) { this.h = CONFIG.CHICKEN/1.5; this.y += CONFIG.CHICKEN/3; this.crouch = true; } 
        } else if (this.crouch) { 
            if (!activeTiles.some(t => this.col({x:this.x, y:this.y-CONFIG.CHICKEN/3, w:this.w, h:CONFIG.CHICKEN}, t))) { 
                this.h = CONFIG.CHICKEN; this.y -= CONFIG.CHICKEN/3; this.crouch = false; 
            } 
        }

        // 4. RUCH W OSI X
        this.vx = 0; 
        if (keys['a']) { this.vx = -spd; this.dir = -1; } 
        if (keys['d']) { this.vx = spd; this.dir = 1; } 
        if (this.inWater) this.vx *= 0.5; 
        
        this.x += this.vx;
        activeTiles.forEach(t => { 
            if (this.col(this, t)) { if (this.vx>0) this.x = t.x - this.w; if (this.vx<0) this.x = t.x + t.w; }
        });

        // 5. GRAWITACJA I INTELIGENTNY SPADOCHRON
        if (this.onGround) this.fuel = 60; 
        let isGliding = false;
        
        // Spadochron otwiera się dopiero podczas SPADANIA, żeby nie hamował skoku
        if ((keys['w']||keys[' ']) && !this.onGround && !this.inWater && this.vy > 0 && this.fuel > 0) {
            this.vy = CONFIG.GLIDE; this.fuel--; isGliding = true;
        }
        
        if (!isGliding) { 
            this.vy += this.inWater ? (CONFIG.GRAVITY*0.4) : CONFIG.GRAVITY; 
            if (this.vy > CONFIG.MAX_FALL) this.vy = CONFIG.MAX_FALL;
        } 
        
        this.y += this.vy; this.onGround = false;
        
        activeTiles.forEach(t => { 
            if (this.col(this, t)) { 
                if (this.vy > 0) { 
                    this.y = t.y - this.h; this.vy = 0; this.onGround = true; 
                    // Kurz przy mocnym lądowaniu
                    if (!isGliding && this.vy > 10) ptc.spawn(this.x+this.w/2, this.y+this.h, '#bdc3c7', 8, 3);
                } 
                else if (this.vy < 0) { this.y = t.y + t.h; this.vy = 0; } 
            }
        });

        // 6. DETEKCJA ŚMIERCI (Ograniczony hitbox kolców)
        if (this.y > 1500) this.die(ptc);
        
        lvl.hazards.filter(h => h.x > this.x - 200 && h.x < this.x + 200).forEach(h => { 
            // Kolec zabija tylko na górnych 60% swojej wysokości (Czubek kolca)
            let hY = h.id === 'kolec' ? h.y + h.h * 0.4 : h.y;
            let hH = h.id === 'kolec' ? h.h * 0.6 : h.h;
            // Zwężamy też trochę na boki
            let hW = h.id === 'kolec' ? h.w * 0.6 : h.w;
            let hX = h.id === 'kolec' ? h.x + h.w * 0.2 : h.x;
            
            if (this.col(this, {x: hX, y: hY, w: hW, h: hH}) && this.shield <= 0) this.die(ptc);
        });
        
        // 7. ZBIERANIE PRZEDMIOTÓW
        for (let i = lvl.items.length - 1; i >= 0; i--) {
            let it = lvl.items[i];
            if (this.col(this, it)) {
                if (it.type === 'cp') { this.rx = it.x; this.ry = it.y - CONFIG.CHICKEN; ptc.spawn(it.x+30, it.y+30, '#3498db', 20, 5); }
                else if (it.type === 'seed') { this.score += 10; ptc.spawn(it.x+15, it.y+15, '#f1c40f', 15, 4); lvl.items.splice(i, 1); }
                else if (it.type === 'shield') { this.shield = 300; ptc.spawn(it.x+25, it.y+25, '#9b59b6', 25, 6); lvl.items.splice(i, 1); }
                else if (it.type === 'jump') { this.jumpB = 600; ptc.spawn(it.x+25, it.y+25, '#2ecc71', 25, 6); lvl.items.splice(i, 1); }
            }
        }
    }

    die(ptc) {
        this.dead = true; this.nuggetLanded = false; 
        this.vy = -12; // Wybicie nuggetsów w górę
        this.vx = (this.dir * 4); // Odrzut w bok!
        this.nuggetBounce = 8;
        this.y -= 15; // Wyciągnięcie kury z hitboxa kolców
        ptc.spawn(this.x+this.w/2, this.y+this.h/2, '#e74c3c', 40, 10);
    }

    col(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
}

// ============================================================================
// [MODUŁ 5] ZARZĄDZANIE WEJŚCIEM (WIELKIE, KWADRATOWE JOYSTICKI)
// ============================================================================
class Input {
    constructor() {
        this.k = {}; this.pk = {}; this.crouch = false;
        // JOYSTICKI SĄ TERAZ OGROMNYMI KWADRATAMI W IDEALNYM MIEJSCU (140x140)
        this.j = { h: {x: 20, y: 380, w: 140, h: 140}, v: {x: 640, y: 380, w: 140, h: 140} };
        
        window.addEventListener("keydown", e => this.k[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => this.k[e.key.toLowerCase()] = false);
        
        if (CONFIG.IS_MOBILE) {
            canvas.addEventListener('touchstart', e => this.t(e), {passive: false});
            canvas.addEventListener('touchmove', e => this.t(e), {passive: false});
            canvas.addEventListener('touchend', e => this.t(e), {passive: false});
        }
    }

    update() { Object.keys(this.k).forEach(key => this.pk[key] = this.k[key]); if (CONFIG.IS_MOBILE) this.k['s'] = this.crouch; }

    t(e) {
        if(game.state === "PLAYING" && !game.paused) e.preventDefault();
        this.k['a'] = false; this.k['d'] = false; this.k['w'] = false; this.k[' '] = false;
        const r = canvas.getBoundingClientRect();

        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && (game.state === "LOBBY" || game.paused || (tx > 720 && ty < 80))) { game.click(tx, ty); return; }

            if (game.state === "PLAYING" && !game.paused) {
                let jh = this.j.h; let jv = this.j.v;
                // Rozszerzone strefy łapania dotyku
                if (tx > jh.x-20 && tx < jh.x+jh.w+20 && ty > jh.y-20 && ty < jh.y+jh.h+20) {
                    if (tx < jh.x + jh.w/2 - 10) this.k['a'] = true; else if (tx > jh.x + jh.w/2 + 10) this.k['d'] = true;
                }
                if (tx > jv.x-20 && tx < jv.x+jv.w+20 && ty > jv.y-20 && ty < jv.y+jv.h+20) {
                    if (ty < jv.y + jv.h/2) this.k['w'] = true; 
                }
            }
        }

        // Kucanie - jedno kliknięcie na dolną część kwadratu
        if (e.type === 'touchstart' && game.state === "PLAYING" && !game.paused) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let tx = (e.changedTouches[i].clientX - r.left) * (canvas.width / r.width); 
                let ty = (e.changedTouches[i].clientY - r.top) * (canvas.height / r.height);
                let jv = this.j.v;
                if (tx > jv.x-20 && tx < jv.x+jv.w+20 && ty > jv.y-20 && ty < jv.y+jv.h+20 && ty > jv.y + jv.h/2 + 10) {
                    this.crouch = !this.crouch; this.k['s'] = this.crouch;
                }
            }
        }
    }
}

// ============================================================================
// [MODUŁ 6] GŁÓWNA PĘTLA I RENDERER (BEZ DZIUR W MAPIE)
// ============================================================================
class Game {
    constructor() {
        this.state = "LOADING"; this.paused = false; this.pMenu = "MAIN";
        this.camX = 0; this.ticks = 0; this.winT = 0;
        this.lvl = null; this.pl = new Player(); this.ptc = new ParticleSystem();
        this.prog = { easy: 0, medium: 0, hard: 0 };
        try { let s = localStorage.getItem('kokoszka_v40'); if(s) this.prog = JSON.parse(s); } catch(e){}
    }

    click(mx, my) {
        if (this.state === "LOBBY") {
            if (mx>300 && mx<500) { if(my>180 && my<240) this.start('easy'); else if(my>260 && my<320) this.start('medium'); else if(my>340 && my<400) this.start('hard'); }
        } else if (this.state === "PLAYING") {
            if (mx>720 && my<80 && !this.paused) { this.paused = true; this.pMenu = "MAIN"; input.k={}; } 
            else if (this.paused) {
                if (this.pMenu === "MAIN") {
                    if (mx>300 && mx<500) { if (my>280 && my<340) this.paused = false; else if (my>360 && my<420) this.pMenu = "SETTINGS"; else if (my>440 && my<500) { this.state = "LOBBY"; this.paused = false; } }
                } else if (this.pMenu === "SETTINGS") {
                    if (mx>300 && mx<500) { if (my>320 && my<380) { this.prog = {easy:0,medium:0,hard:0}; localStorage.setItem('kokoszka_v40', JSON.stringify(this.prog)); alert("Postęp wyczyszczony!"); } else if (my>460 && my<520) this.pMenu = "MAIN"; }
                }
            }
        }
    }

    start(diff) {
        this.cDiff = diff; this.lvl = new LevelGenerator(diff); this.pl.reset(300, 100); this.pl.score = 0;
        this.camX = 0; input.crouch = false; this.state = "PLAYING"; this.paused = false; this.ptc.particles = [];
    }

    update() {
        this.ticks++; this.ptc.update();
        if (this.state === "WIN") { this.winT--; if (this.winT <= 0) this.state = "LOBBY"; return; }
        if (this.state !== "PLAYING" || this.paused) return;

        this.camX += (this.pl.x - 350 - this.camX) * 0.12; 
        if (this.camX < 0) this.camX = 0;

        let wasDead = this.pl.dead;
        this.pl.update(input.k, input.pk, this.lvl, this.ptc);
        
        // RESET MAPY PO ŚMIERCI
        if (wasDead && !this.pl.dead) {
            this.lvl.items = JSON.parse(JSON.stringify(this.lvl.initItems));
        }

        // WYGRANA
        this.lvl.chicks.forEach(c => { 
            if (this.pl.col(this.pl, c)) { 
                this.ptc.spawn(c.x+c.w/2, c.y+c.h/2, '#f1c40f', 60, 12, 1.5);
                this.lvl.chicks = []; this.prog[this.cDiff] = 1; 
                try { localStorage.setItem('kokoszka_v40', JSON.stringify(this.prog)); } catch(e){} 
                this.state = "WIN"; this.winT = 200; 
            }
        });
        
        input.update();
    }

    txt(txt, x, y, s, c) { ctx.font=`bold ${s}px 'Segoe UI',Arial`; ctx.textAlign="center"; ctx.strokeStyle="#111"; ctx.lineWidth=5; ctx.strokeText(txt,x,y); ctx.fillStyle=c; ctx.fillText(txt,x,y); }
    spr(id, x, y, w, h) { if(A.get(id)) ctx.drawImage(A.get(id), x, y, w, h); }

    draw() {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,CONFIG.W, CONFIG.H);

        if (this.state === "LOADING") {
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,CONFIG.W, CONFIG.H);
            let dots = ".".repeat(Math.floor(Date.now() / 300) % 4);
            let pct = Math.round((A.loaded / A.total) * 100);
            this.txt(`KARMIMY KURY${dots} ${pct}%`, 400, 300, 42, "#f1c40f"); 
            ctx.fillStyle = "#333"; ctx.fillRect(200, 340, 400, 20); ctx.fillStyle = "#2ecc71"; ctx.fillRect(200, 340, 400 * (A.loaded / A.total), 20);
            return;
        }

        this.spr('niebo', 0, 0, CONFIG.W, CONFIG.H);

        if (this.state === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,CONFIG.W, CONFIG.H);
            this.txt("KOKOSZKA v4.0 DEFINITIVE", 400, 100, 52, "#f1c40f");
            this.txt("URATUJ ZAGINIONE KURCZAKI!", 400, 150, 22, "white");
            ['easy', 'medium', 'hard'].forEach((lv, i) => { 
                ctx.fillStyle = this.prog[lv] ? "#2ecc71" : "#e67e22"; ctx.fillRect(280, 200 + i*80, 240, 60); 
                this.txt(`${lv.toUpperCase()} (${this.prog[lv]}/1)`, 400, 238 + i*80, 24, "white"); 
            });
        } 
        else if (this.state === "PLAYING" || this.state === "WIN") {
            const isVis = (o) => o.x > this.camX - 200 && o.x < this.camX + 1000;
            let l = this.lvl; let p = this.pl;

            l.decos.filter(isVis||(d=>d.id==='slonce')).forEach(d => { if(d.id==='slonce') this.spr(d.id, d.x-this.camX*0.05, d.y, d.w, d.h); else this.spr(d.id, d.x-this.camX, d.y, d.w, d.h); });
            
            // SYSTEM ANTY-DZIUROWY (Rysuje tło pod blokiem, aby scalić szpary)
            l.tiles.filter(isVis).forEach(t => { 
                if(t.id==='ziemia'||t.id==='trawa'||t.id==='kamien'||t.id==='piasek'||t.id==='blokkolcow') {
                    ctx.fillStyle = (t.id==='kamien') ? '#333' : (t.id==='piasek' ? '#d35400' : '#5c3a21');
                    ctx.fillRect(Math.floor(t.x-this.camX), Math.floor(t.y), t.w+1, t.h+1); 
                }
                this.spr(t.id, t.x-this.camX, t.y, t.w, t.h); 
            });
            
            l.hazards.filter(isVis).forEach(h => this.spr(h.id, h.x-this.camX, h.y, h.w, h.h));
            ctx.globalAlpha = 0.65; l.waters.filter(isVis).forEach(w => this.spr('woda', w.x-this.camX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            l.items.filter(isVis).forEach(i => this.spr(i.id, i.x-this.camX, i.y, i.w, i.h));
            
            l.chicks.forEach(c => {
                let bounce = Math.sin(this.ticks * 0.1) * 10;
                this.spr('kurczak', c.x-this.camX, c.y + bounce, c.w, c.h);
                this.txt("URATUJ MNIE!", c.x-this.camX + c.w/2, c.y + bounce - 15, 18, "#f1c40f");
            });

            this.ptc.draw(ctx, this.camX);

            ctx.save(); ctx.translate(p.x - this.camX + p.w/2, p.y + p.h/2); if (p.dir === -1) ctx.scale(-1, 1);
            let s = p.dead ? 'kuraNuggets' : (p.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!p.onGround && !p.dead) s = 'KuraSkok'; 
            if ((input.k['w']||input.k[' ']) && !p.onGround && p.vy>0 && p.fuel>0) s = 'KuraSzybujaca'; 
            if (p.crouch) s = 'KuraKlucanie';
            this.spr(s, -p.w/2, -p.h/2, p.w, p.h); 
            if(p.shield > 0) { ctx.globalAlpha = 0.5; this.spr('tarcza', -p.w/2-10, -p.h/2-10, p.w+20, p.h+20); ctx.globalAlpha = 1; }
            ctx.restore();

            ctx.save(); ctx.translate(750, 50); ctx.rotate(this.ticks * 0.02); this.spr('zebatka', -30, -30, 60, 60); ctx.restore();
            
            ctx.textAlign = "left"; this.txt("PKT: " + p.score, 20, 50, 32, "white");
            let tY = 90;
            if(p.shield > 0) { this.spr('tarcza', 20, tY, 40, 40); this.txt(Math.ceil(p.shield/60)+"s", 95, tY+28, 26, "white"); tY += 50; }
            if(p.jumpB > 0) { this.spr('strzalkaSkoku', 20, tY, 40, 40); this.txt(Math.ceil(p.jumpB/60)+"s", 95, tY+28, 26, "white"); }
            
            if (CONFIG.IS_MOBILE) { 
                let jh = input.j.h; let jv = input.j.v;
                ctx.globalAlpha = 0.8; this.spr('poziomo', jh.x, jh.y, jh.w, jh.h); this.spr('skokk', jv.x, jv.y, jv.w, jv.h); ctx.globalAlpha = 1.0;
                ctx.textAlign = "center"; this.txt("RUCH", jh.x + jh.w/2, jh.y - 15, 20, "white"); this.txt("SKOK/LOT", jv.x + jv.w/2, jv.y - 15, 20, "white"); this.txt("KUCANIE", jv.x + jv.w/2, jv.y + jv.h + 25, 20, input.crouch ? "#2ecc71" : "white");
            }
            
            if (this.state === "WIN") {
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,CONFIG.W, CONFIG.H);
                let sz = 60 + Math.sin(this.ticks * 0.15) * 5;
                this.txt("KURCZAK URATOWANY!", 400, 300, sz, "#f1c40f"); this.txt("+100 PKT DO CHWAŁY", 400, 360, 26, "white");
            }

            if (this.paused) { 
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,CONFIG.W, CONFIG.H); 
                if (this.pMenu === "MAIN") {
                    this.txt("PAUZA", 400, 180, 56, "white"); ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 280, 200, 60); this.txt("WZNÓW", 400, 318, 24, "white");
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 360, 200, 60); this.txt("USTAWIENIA", 400, 398, 24, "white"); ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 440, 200, 60); this.txt("WYJDŹ", 400, 478, 24, "white");
                } else if (this.pMenu === "SETTINGS") {
                    this.txt("USTAWIENIA", 400, 180, 56, "white"); ctx.fillStyle = "#e67e22"; ctx.fillRect(280, 320, 240, 60); this.txt("RESET ZAPISU", 400, 358, 22, "white");
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(280, 460, 240, 60); this.txt("WRÓĆ", 400, 498, 24, "white");
                }
            }
        }
        ctx.textAlign = "left"; this.txt("v4.0 Definitive", 10, 25, 16, "rgba(255,255,255,0.7)");
    }
}

// ============================================================================
// [7] INICJALIZACJA SILNIKA
// ============================================================================
const A = new AssetManager();
const input = new InputManager();
const game = new Game();

canvas.addEventListener("mousedown", e => {
    const r = canvas.getBoundingClientRect();
    game.click((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
});

A.load(() => { game.state = "LOBBY"; });

function loop() { game.update(); game.draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

</script>
