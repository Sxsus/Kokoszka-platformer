<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kokoszka Platformer v3.0 Ultimate</title>
    <style>
        body { 
            margin: 0; background: #000; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { 
            background: #87CEEB; box-shadow: 0 0 50px rgba(0,0,0,1); border: 2px solid #222; 
            image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
/**
 * ============================================================================
 * KOKOSZKA PLATFORMER - v3.0 ULTIMATE ENGINE
 * Profesjonalny silnik 2D (~1000 linii).
 * Stworzony do idealnej fizyki, generacji biomów i czyszczenia grafik.
 * ============================================================================
 */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { alpha: false });

// --- KONFIGURACJA SILNIKA ---
const C = {
    FPS: 60,
    W: 800,
    H: 600,
    TILE: 60,          // Wielkość bloku x1.5
    CHICKEN: 90,       // Wielkość kury x2.25
    GRAVITY: 1.15,
    MAX_FALL: 18,
    JUMP: -21,
    GLIDE: 2.5,
    SPEED: 9,
    IS_MOBILE: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0)
};

// ============================================================================
// [1] ASSET MANAGER: ZAABSOLUTNIE NAJLEPSZE USUWANIE SZACHOWNIC
// ============================================================================
class AssetManager {
    constructor() {
        this.assets = {}; this.loaded = 0; this.total = 0; this.onReady = null;
        this.paths = {
            'KuraStojaca': ['postac/KuraStojaca'], 'KuraChodzaca': ['postac/KuraChodzaca'], 
            'KuraSkok': ['postac/KuraSkok'], 'KuraSzybujaca': ['postac/KuraSzybujaca'], 
            'KuraKlucanie': ['postac/KuraKlucanie'], 'kuraNuggets': ['postac/kuraNuggets'], 'kurczak': ['postac/kurczak'],
            'trawa': ['bloki/trawa'], 'ziemia': ['bloki/ziemia'], 'kamien': ['bloki/kamien'], 
            'drewno': ['bloki/drewno'], 'lod': ['bloki/lod'], 'piasek': ['bloki/piasek'], 
            'woda': ['bloki/woda'], 'lawa': ['hazard/lawa'], 'kolec': ['hazard/kolec'],
            'checkPoint': ['mechanika/checkPoint'], 'tarcza': ['mechanika/tarcza'], 
            'strzalkaSkoku': ['mechanika/strzalkaSkoku'], 'Ziarna': ['mechanika/Ziarna'], 
            'niebo': ['dekoracje/niebo'], 'slonce': ['dekoracje/slonce'],
            'kwiat': ['dekoracje/kwiat'], 'krzak': ['dekoracje/krzak'], 
            'maledrzewo': ['dekoracje/maledrzewo'], 'duzedrzewo': ['dekoracje/duzedrzewo'], 
            'poziomo': ['poziomo', 'ui/poziomo'], 'skokk': ['skokk', 'ui/skokk'], 'zebatka': ['zebatka', 'ui/zebatka']
        };
        this.total = Object.keys(this.paths).length;
    }

    // Algorytm "Różdżki" (Flood-Fill), który wyżera szarą szachownicę z rogów obrazka
    cleanCheckerboard(img, name) {
        if (name === 'niebo') return img; // Tła nie ruszamy
        let c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
        let cx = c.getContext('2d', {willReadFrequently: true}); cx.drawImage(img, 0, 0);
        try {
            let imgData = cx.getImageData(0, 0, c.width, c.height); let data = imgData.data;
            let stack = [];
            // Zaczynamy zjadanie szachownicy od wszystkich krawędzi
            for(let x=0; x<c.width; x++){ stack.push({x:x, y:0}); stack.push({x:x, y:c.height-1}); }
            for(let y=0; y<c.height; y++){ stack.push({x:0, y:y}); stack.push({x:c.width-1, y:y}); }
            
            let visited = new Uint8Array(c.width * c.height);
            while(stack.length > 0) {
                let pt = stack.pop(); let x = pt.x, y = pt.y;
                if(x<0 || x>=c.width || y<0 || y>=c.height) continue;
                let idx = y*c.width + x; if(visited[idx]) continue; visited[idx] = 1;
                
                let p = idx * 4; let r = data[p], g = data[p+1], b = data[p+2], a = data[p+3];
                if(a === 0) { stack.push({x:x+1,y}, {x:x-1,y}, {x,y:y+1}, {x,y:y-1}); continue; }
                
                // Detekcja szarych/białych kratek
                let isGrey = Math.abs(r-g)<25 && Math.abs(g-b)<25 && r>90 && r<220;
                let isWhite = r>230 && g>230 && b>230;
                if(isGrey || isWhite) {
                    data[p+3] = 0; // Przezroczystość!
                    stack.push({x:x+1,y}, {x:x-1,y}, {x,y:y+1}, {x,y:y-1});
                }
            }
            cx.putImageData(imgData, 0, 0);
            
            // Auto-Crop
            let minX=c.width, minY=c.height, maxX=0, maxY=0, hasPix=false;
            for(let y=0; y<c.height; y++) {
                for(let x=0; x<c.width; x++) {
                    if (data[(y*c.width + x)*4 + 3] > 10) {
                        hasPix=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
                    }
                }
            }
            if(hasPix && maxX>=minX && maxY>=minY) {
                let cc = document.createElement('canvas'); cc.width = maxX-minX+1; cc.height = maxY-minY+1;
                cc.getContext('2d').drawImage(c, minX, minY, cc.width, cc.height, 0, 0, cc.width, cc.height);
                return cc;
            }
        } catch(e) {}
        return c;
    }

    fallback(n) {
        let c=document.createElement('canvas'); c.width=C.TILE; c.height=C.TILE; let cx=c.getContext('2d');
        if (n==='zebatka') { cx.translate(30,30); cx.fillStyle='#f39c12'; cx.beginPath(); cx.arc(0,0,28,0,Math.PI*2); cx.fill(); for(let i=0;i<8;i++){cx.rotate(Math.PI/4); cx.fillStyle='#e67e22'; cx.fillRect(-6,-30,12,10);} cx.fillStyle='#2c3e50'; cx.beginPath(); cx.arc(0,0,10,0,Math.PI*2); cx.fill(); return c; }
        cx.fillStyle = n.includes('trawa')||n.includes('krzak')?'#2ecc71':n.includes('ziemia')||n.includes('kamien')?'#8e44ad':n.includes('woda')?'#3498db':n.includes('piasek')?'#f1c40f':n.includes('lawa')||n.includes('kolec')?'#e74c3c':n.includes('Kura')||n.includes('kurczak')?'#e67e22':'#7f8c8d';
        cx.fillRect(0,0,C.TILE,C.TILE); cx.fillStyle='rgba(255,255,255,0.9)'; cx.font='bold 11px Arial'; cx.textAlign="center"; cx.fillText(n.substring(0,8),30,35); return c;
    }

    load(cb) {
        this.onReady = cb;
        Object.keys(this.paths).forEach(k => {
            let p = this.paths[k]; let att = [];
            p.forEach(path => { att.push(`${path}.png.png`, `${path}.png`); });
            let idx = 0; let img = new Image(); img.crossOrigin = "Anonymous";
            const next = () => { if(idx < att.length) { img.src = att[idx]+"?v="+Date.now(); idx++; } else { this.assets[k] = this.fallback(k); this.done(); } };
            img.onload = () => { this.assets[k] = this.cleanCheckerboard(img, k); this.done(); };
            img.onerror = next; next();
        });
    }

    done() { this.loaded++; if(this.loaded === this.total && this.onReady) this.onReady(); }
    get(k) { return this.assets[k] || this.assets['trawa']; }
}

// ============================================================================
// [2] SYSTEM CZĄSTECZEK (EFEKTY WIZUALNE)
// ============================================================================
class Particles {
    constructor() { this.p = []; }
    spawn(x, y, color, count, speed) {
        for(let i=0; i<count; i++) {
            this.p.push({
                x: x, y: y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed - 2,
                size: Math.random()*6 + 4, color: color, life: 1.0, decay: Math.random()*0.03 + 0.02
            });
        }
    }
    update() {
        for(let i=this.p.length-1; i>=0; i--) {
            let pt = this.p[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.1; pt.life-=pt.decay;
            if(pt.life<=0) this.p.splice(i,1);
        }
    }
    draw(ctx, camX) {
        this.p.forEach(pt => {
            ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color;
            ctx.fillRect(pt.x - camX, pt.y, pt.size, pt.size);
        });
        ctx.globalAlpha = 1.0;
    }
}

// ============================================================================
// [3] GENERATOR POZIOMÓW (JASKINIE, PIASEK, PERFEKCYJNE POZYCJONOWANIE)
// ============================================================================
class Level {
    constructor(diff) {
        this.tiles = []; this.hazards = []; this.waters = []; this.decos = []; 
        this.items = []; this.chicks = []; this.bgLava = [];
        this.initItems = []; // Do resetu
        
        let len = diff === 'easy' ? 1200 : (diff === 'medium' ? 2400 : 3600);
        let floorY = 400; let gap = 0; let safe = 15; 
        let hChance = diff === 'hard' ? 0.20 : 0.08;
        let gChance = diff === 'hard' ? 0.15 : 0.05;
        let caveLen = 0; let inCave = false; let isLavaCave = false;

        this.decos.push({x: 600, y: 80, w: 120, h: 120, id: 'slonce'});

        for (let i = 0; i < len; i++) {
            let x = i * C.TILE;

            // Logika Biomów Jaskiniowych
            if (caveLen <= 0 && i > 30 && i < len - 30) {
                inCave = Math.random() < 0.25; 
                isLavaCave = inCave && Math.random() < 0.4;
                caveLen = Math.floor(Math.random() * 40) + 20; 
            }
            caveLen--;

            if (inCave) { // Sufity jaskini
                this.tiles.push({x, y: floorY - C.TILE*5.5, w: C.TILE, h: C.TILE, id: 'kamien', solid: true});
                this.tiles.push({x, y: floorY - C.TILE*6.5, w: C.TILE, h: C.TILE, id: 'kamien', solid: true});
            }

            // Start i Meta (Zawsze bezpieczne i solidne)
            if (i < 15 || i > len - 15) {
                this.addGround(x, floorY, 'trawa'); continue;
            }

            // PRZEPAŚCIE (W tym lawowe)
            if (gap > 0) {
                gap--;
                let haz = isLavaCave ? 'lawa' : (Math.random() > 0.6 ? 'lawa' : 'void');
                this.hazards.push({x, y: 800, w: C.TILE, h: C.TILE, id: haz});
                if (gap === 0) safe = 4; continue;
            }

            if (safe <= 0 && Math.random() < gChance) { gap = diff==='hard'?Math.floor(Math.random()*3)+3:2; continue; }
            if (safe > 0) safe--;

            // WODA Z PIASKIEM (Detekcja brzegów)
            if (safe <= 0 && !inCave && Math.random() < 0.06) {
                let wWidth = Math.floor(Math.random() * 4) + 2;
                this.addGround(i*C.TILE, floorY, 'piasek'); i++; // Lewy brzeg
                for(let w=0; w<wWidth; w++) {
                    let wx = (i+w)*C.TILE;
                    this.waters.push({x: wx, y: floorY+15, w: C.TILE, h: C.TILE, id: 'woda'}); 
                    this.addDeepDirt(wx, floorY+C.TILE);
                }
                i += wWidth;
                this.addGround(i*C.TILE, floorY, 'piasek'); // Prawy brzeg
                safe = 3; continue;
            } 
            
            // STANDARDOWY LĄD
            let topId = inCave ? 'kamien' : 'trawa';
            this.addGround(x, floorY, topId);

            // OZDOBY TŁA I PLATFORMY (Krzak to platforma, kwiat to tło)
            if (!inCave && Math.random() < 0.15) {
                if (Math.random() > 0.5) this.tiles.push({x, y: floorY - C.TILE, w: C.TILE, h: C.TILE, id: 'krzak', solid: true}); 
                else this.decos.push({x, y: floorY - C.TILE, w: C.TILE, h: C.TILE, id: 'kwiat'}); // Kwiat to ozdoba!
            } 

            // DRZEWA
            if (!inCave && Math.random() < 0.08) {
                if (Math.random()>0.5) this.decos.push({x, y: floorY-240, w: C.TILE*2.5, h: C.TILE*4, id: 'duzedrzewo'});
                else this.decos.push({x, y: floorY-150, w: C.TILE*1.5, h: C.TILE*2.5, id: 'maledrzewo'});
            }

            // KOLCE
            if (safe <= 0 && Math.random() < hChance) {
                // Hitbox kolca jest precyzyjnie obcięty podczas kolizji
                this.hazards.push({x, y: floorY - C.TILE, w: C.TILE, h: C.TILE, id: 'kolec'});
                safe = 2; 
            }

            // MOCE I CHECKPOINTY - Idealnie osadzone na trawie!
            if (i > 10) {
                if (i % 65 === 0) this.items.push({type: 'cp', x, y: floorY - C.TILE, w: C.TILE, h: C.TILE, id: 'checkPoint'});
                else if (i % 150 === 75) this.items.push({type: 'shield', x: x+5, y: floorY - 50, w: 50, h: 50, id: 'tarcza'});
                else if (i % 210 === 105) this.items.push({type: 'jump', x: x+5, y: floorY - 50, w: 50, h: 50, id: 'strzalkaSkoku'});
                else if (i % 14 === 0) this.items.push({type: 'seed', x: x+15, y: floorY - 30, w: 30, h: 30, id: 'Ziarna'});
            }
            
            // LOSOWE WZNIESIENIA
            if (safe <= 0 && Math.random() < 0.15) {
                floorY += (Math.random() > 0.5 ? -C.TILE : C.TILE);
                if (floorY > 480) floorY = 480; if (floorY < 240) floorY = 240; 
                safe = 2; 
            }
        }
        
        this.chicks.push({x: (len-4)*C.TILE, y: 300, w: C.CHICKEN, h: C.CHICKEN, id: 'kurczak'});
        
        // Zapis do resetu po śmierci
        this.initItems = JSON.parse(JSON.stringify(this.items));
    }

    addGround(x, y, id) {
        this.tiles.push({x, y, w: C.TILE, h: C.TILE, id: id, solid: true});
        this.addDeepDirt(x, y + C.TILE);
    }

    addDeepDirt(x, startY) {
        // Głęboka ziemia do samego dna, żeby nie było widać nieba pod mapą!
        for(let dy = startY; dy <= C.H + 300; dy += C.TILE) {
            this.tiles.push({x, y: dy, w: C.TILE, h: C.TILE, id: 'ziemia', solid: true});
        }
    }
}

// ============================================================================
// [4] FIZYKA I GRACZ (KURA -> NUGGETSY)
// ============================================================================
class Player {
    constructor() { this.reset(300, 100); this.score = 0; this.shield = 0; this.jumpB = 0; this.rx = 300; this.ry = 100; }
    
    reset(x, y) {
        this.x=x; this.y=y; this.w=C.CHICKEN; this.h=C.CHICKEN; this.vx=0; this.vy=0;
        this.onGround=false; this.crouch=false; this.dead=false; this.nuggetLanded=false;
        this.fuel=0; this.inWater=false; this.dir=1;
    }

    update(keys, pKeys, lvl, particles) {
        if (this.shield > 0) this.shield--; if (this.jumpB > 0) this.jumpB--;

        let activeTiles = lvl.tiles.filter(t => t.x > this.x - 200 && t.x < this.x + 200);
        this.inWater = lvl.waters.some(w => this.col(this, w));

        // 1. ŚMIERĆ I FIZYKA NUGGETSÓW
        if (this.dead) {
            if (!this.nuggetLanded) {
                this.vy += C.GRAVITY; this.y += this.vy;
                activeTiles.forEach(t => { 
                    if (this.col(this, t) && this.vy > 0) { 
                        this.y = t.y - this.h; this.vy = 0; this.nuggetLanded = true; 
                        particles.spawn(this.x+this.w/2, this.y+this.h, '#f1c40f', 15, 6);
                    }
                });
            }
            return;
        }

        // 2. SKOK (Tylko na świeże wciśnięcie klawisza)
        let jumpHit = ((keys['w'] && !pKeys['w']) || (keys[' '] && !pKeys[' ']));
        if (jumpHit && (this.onGround || this.inWater)) {
            this.vy = this.jumpB > 0 ? (C.JUMP - 6) : C.JUMP; 
            if (this.inWater) this.vy /= 1.5; 
            this.onGround = false; this.fuel = 50; 
            particles.spawn(this.x+this.w/2, this.y+this.h, '#fff', 10, 3);
        }

        // Podłoże
        let spd = C.SPEED; let floor = activeTiles.find(t => this.col({...this, y: this.y + 1}, t));
        if (floor) { if(floor.id === 'lod') spd *= 1.6; if(floor.id === 'piasek') spd *= 0.6; }

        // 3. KUCANIE
        if (keys['s'] && !this.inWater) { 
            if (!this.crouch) { this.h = C.CHICKEN/1.5; this.y += C.CHICKEN/3; this.crouch = true; } 
        } else if (this.crouch) { 
            if (!activeTiles.some(t => this.col({x:this.x, y:this.y-C.CHICKEN/3, w:this.w, h:C.CHICKEN}, t))) { 
                this.h = C.CHICKEN; this.y -= C.CHICKEN/3; this.crouch = false; 
            } 
        }

        // 4. RUCH POZIOMY
        this.vx = 0; 
        if (keys['a']) { this.vx = -spd; this.dir = -1; } 
        if (keys['d']) { this.vx = spd; this.dir = 1; } 
        if (this.inWater) this.vx *= 0.5; 
        
        this.x += this.vx;
        activeTiles.forEach(t => { 
            if (this.col(this, t)) { if (this.vx>0) this.x = t.x - this.w; if (this.vx<0) this.x = t.x + t.w; }
        });

        // 5. GRAWITACJA I SPADOCHRON
        if (this.onGround) this.fuel = 60; 
        let isGliding = false;
        // Spadochron otwiera się TYLKO przy spadaniu!
        if ((keys['w']||keys[' ']) && !this.onGround && !this.inWater && this.vy > 0 && this.fuel > 0) {
            this.vy = C.GLIDE; this.fuel--; isGliding = true;
        }
        
        if (!isGliding) { 
            this.vy += this.inWater ? (C.GRAVITY*0.4) : C.GRAVITY; 
            if (this.vy > C.MAX_FALL) this.vy = C.MAX_FALL;
        } 
        
        this.y += this.vy; this.onGround = false;
        
        activeTiles.forEach(t => { 
            if (this.col(this, t)) { 
                if (this.vy > 0) { 
                    this.y = t.y - this.h; this.vy = 0; this.onGround = true; 
                    if (!isGliding && this.vy > 10) particles.spawn(this.x+this.w/2, this.y+this.h, '#ddd', 5, 2);
                } 
                else if (this.vy < 0) { this.y = t.y + t.h; this.vy = 0; } 
            }
        });

        // 6. KOLIZJE Z PUŁAPKAMI
        if (this.y > 1500) this.die(particles);
        
        lvl.hazards.filter(h => h.x > this.x - 200 && h.x < this.x + 200).forEach(h => { 
            // PRECYZYJNY HITBOX KOLCA: Górna, cienka część
            let hY = h.id === 'kolec' ? h.y + h.h * 0.4 : h.y;
            let hH = h.id === 'kolec' ? h.h * 0.6 : h.h;
            let hW = h.id === 'kolec' ? h.w * 0.6 : h.w;
            let hX = h.id === 'kolec' ? h.x + h.w * 0.2 : h.x;
            
            if (this.col(this, {x: hX, y: hY, w: hW, h: hH}) && this.shield <= 0) this.die(particles);
        });
        
        // 7. PRZEDMIOTY
        for (let i = lvl.items.length - 1; i >= 0; i--) {
            let it = lvl.items[i];
            if (this.col(this, it)) {
                if (it.type === 'cp') { this.rx = it.x; this.ry = it.y - C.CHICKEN; particles.spawn(it.x+20, it.y, '#3498db', 15, 4); }
                else if (it.type === 'seed') { this.score += 10; particles.spawn(it.x+15, it.y+15, '#f1c40f', 10, 3); lvl.items.splice(i, 1); }
                else if (it.type === 'shield') { this.shield = 300; particles.spawn(it.x+25, it.y+25, '#9b59b6', 20, 5); lvl.items.splice(i, 1); }
                else if (it.type === 'jump') { this.jumpB = 600; particles.spawn(it.x+25, it.y+25, '#2ecc71', 20, 5); lvl.items.splice(i, 1); }
            }
        }
    }

    die(ptc) {
        this.dead = true; this.nuggetLanded = false; this.vy = -12; this.y -= 15;
        ptc.spawn(this.x+this.w/2, this.y+this.h/2, '#e74c3c', 30, 8);
    }

    col(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
}

// ============================================================================
// [5] INPUT MANAGER: PODWYŻSZONE JOYSTICKI I CZYSTE KUCANIE
// ============================================================================
class Input {
    constructor() {
        this.k = {}; this.pk = {}; this.crouch = false;
        // Joysticki wyżej (y=370 zamiast 450)
        this.j = { h: {x: 40, y: 370, w: 100, h: 100}, v: {x: 660, y: 370, w: 100, h: 100} };
        
        window.addEventListener("keydown", e => this.k[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => this.k[e.key.toLowerCase()] = false);
        
        if (C.IS_MOBILE) {
            canvas.addEventListener('touchstart', e => this.t(e), {passive: false});
            canvas.addEventListener('touchmove', e => this.t(e), {passive: false});
            canvas.addEventListener('touchend', e => this.t(e), {passive: false});
        }
    }

    update() { Object.keys(this.k).forEach(key => this.pk[key] = this.k[key]); if (C.IS_MOBILE) this.k['s'] = this.crouch; }

    t(e) {
        if(game.state === "PLAYING" && !game.paused) e.preventDefault();
        this.k['a'] = false; this.k['d'] = false; this.k['w'] = false; this.k[' '] = false;
        const r = canvas.getBoundingClientRect();

        for (let i = 0; i < e.touches.length; i++) {
            let tx = (e.touches[i].clientX - r.left) * (canvas.width / r.width);
            let ty = (e.touches[i].clientY - r.top) * (canvas.height / r.height);

            if (e.type === 'touchstart' && (game.state === "LOBBY" || game.paused || (tx > 720 && ty < 80))) { game.click(tx, ty); return; }

            if (game.state === "PLAYING" && !game.paused) {
                let jh = this.j.h; let jv = this.j.v;
                if (tx > jh.x-30 && tx < jh.x+jh.w+30 && ty > jh.y-30 && ty < jh.y+jh.h+30) {
                    if (tx < jh.x + jh.w/2 - 10) this.k['a'] = true; else if (tx > jh.x + jh.w/2 + 10) this.k['d'] = true;
                }
                if (tx > jv.x-30 && tx < jv.x+jv.w+30 && ty > jv.y-30 && ty < jv.y+jv.h+30) {
                    if (ty < jv.y + jv.h/2) this.k['w'] = true; 
                }
            }
        }

        // Toggle Kucania na START dotyku na dolną część prawego joysticka
        if (e.type === 'touchstart' && game.state === "PLAYING" && !game.paused) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let tx = (e.changedTouches[i].clientX - r.left) * (canvas.width / r.width); 
                let ty = (e.changedTouches[i].clientY - r.top) * (canvas.height / r.height);
                let jv = this.j.v;
                if (tx > jv.x-30 && tx < jv.x+jv.w+30 && ty > jv.y-30 && ty < jv.y+jv.h+30 && ty > jv.y + jv.h/2 + 10) {
                    this.crouch = !this.crouch; this.k['s'] = this.crouch;
                }
            }
        }
    }
}

// ============================================================================
// [6] GŁÓWNA LOGIKA I RENDERER
// ============================================================================
class Game {
    constructor() {
        this.state = "LOADING"; this.paused = false; this.pMenu = "MAIN";
        this.camX = 0; this.ticks = 0; this.winT = 0; this.deathT = 0;
        this.lvl = null; this.pl = new Player(); this.ptc = new Particles();
        this.prog = { easy: 0, medium: 0, hard: 0 };
        try { let s = localStorage.getItem('kokoszka_v30'); if(s) this.prog = JSON.parse(s); } catch(e){}
    }

    click(mx, my) {
        if (this.state === "LOBBY") {
            if (mx>300 && mx<500) { if(my>180 && my<240) this.start('easy'); else if(my>260 && my<320) this.start('medium'); else if(my>340 && my<400) this.start('hard'); }
        } else if (this.state === "PLAYING") {
            if (mx>720 && my<80 && !this.paused) { this.paused = true; this.pMenu = "MAIN"; input.k={}; } 
            else if (this.paused) {
                if (this.pMenu === "MAIN") {
                    if (mx>300 && mx<500) { if (my>280 && my<340) this.paused = false; else if (my>360 && my<420) this.pMenu = "SETTINGS"; else if (my>440 && my<500) { this.state = "LOBBY"; this.paused = false; } }
                } else if (this.pMenu === "SETTINGS") {
                    if (mx>300 && mx<500) { if (my>320 && my<380) { this.prog = {easy:0,medium:0,hard:0}; localStorage.setItem('kokoszka_v30', JSON.stringify(this.prog)); alert("Postęp usunięty!"); } else if (my>460 && my<520) this.pMenu = "MAIN"; }
                }
            }
        }
    }

    start(diff) {
        this.cDiff = diff; this.lvl = new Level(diff); this.pl.reset(300, 100); this.pl.score = 0;
        this.camX = 0; input.crouch = false; this.state = "PLAYING"; this.paused = false; this.ptc.p = [];
    }

    update() {
        this.ticks++; this.ptc.update();
        if (this.state === "WIN") { this.winT--; if (this.winT <= 0) this.state = "LOBBY"; return; }
        if (this.state !== "PLAYING" || this.paused) return;

        this.camX += (this.pl.x - 350 - this.camX) * 0.12; 
        if (this.camX < 0) this.camX = 0;

        let wasDead = this.pl.dead;
        this.pl.update(input.k, input.pk, this.lvl, this.ptc);
        
        // RESET MAPY PO ŚMIERCI (Przywracanie powerupów z Deep Copy)
        if (wasDead && !this.pl.dead) {
            this.lvl.items = JSON.parse(JSON.stringify(this.lvl.initItems));
        }

        // WYGRANA
        this.lvl.chicks.forEach(c => { 
            if (this.pl.col(this.pl, c)) { 
                this.ptc.spawn(c.x+c.w/2, c.y+c.h/2, '#f1c40f', 50, 10);
                this.lvl.chicks = []; this.prog[this.cDiff] = 1; 
                try { localStorage.setItem('kokoszka_v30', JSON.stringify(this.prog)); } catch(e){} 
                this.state = "WIN"; this.winT = 200; 
            }
        });
        
        input.update();
    }

    txt(txt, x, y, s, c) { ctx.font=`bold ${s}px 'Segoe UI',Arial`; ctx.textAlign="center"; ctx.strokeStyle="#111"; ctx.lineWidth=5; ctx.strokeText(txt,x,y); ctx.fillStyle=c; ctx.fillText(txt,x,y); }
    spr(id, x, y, w, h) { if(A.get(id)) ctx.drawImage(A.get(id), x, y, w, h); }

    draw() {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,C.W, C.H);

        if (this.state === "LOADING") {
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,C.W, C.H);
            let dots = ".".repeat(Math.floor(Date.now() / 300) % 4);
            let pct = Math.round((A.loaded / A.total) * 100);
            this.txt(`KARMIENIE KUR${dots} ${pct}%`, 400, 300, 42, "#f1c40f"); 
            ctx.fillStyle = "#333"; ctx.fillRect(200, 340, 400, 20); ctx.fillStyle = "#2ecc71"; ctx.fillRect(200, 340, 400 * (A.loaded / A.total), 20);
            return;
        }

        this.spr('niebo', 0, 0, C.W, C.H);

        if (this.state === "LOBBY") {
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,C.W, C.H);
            this.txt("KOKOSZKA v3.0 ULTIMATE", 400, 100, 52, "#f1c40f");
            this.txt("URATUJ ZAGINIONE KURCZAKI!", 400, 150, 22, "white");
            ['easy', 'medium', 'hard'].forEach((lv, i) => { 
                ctx.fillStyle = this.prog[lv] ? "#2ecc71" : "#e67e22"; ctx.fillRect(280, 200 + i*80, 240, 60); 
                this.txt(`${lv.toUpperCase()} (${this.prog[lv]}/1)`, 400, 238 + i*80, 24, "white"); 
            });
        } 
        else if (this.state === "PLAYING" || this.state === "WIN") {
            const isVis = (o) => o.x > this.camX - 200 && o.x < this.camX + 1000;
            let l = this.lvl; let p = this.pl;

            l.decos.filter(isVis||(d=>d.id==='slonce')).forEach(d => { if(d.id==='slonce') this.spr(d.id, d.x-this.camX*0.05, d.y, d.w, d.h); else this.spr(d.id, d.x-this.camX, d.y, d.w, d.h); });
            
            // SYSTEM ANTY-DZIUROWY: Rysowanie brązowego podkładu pod KAŻDYM blokiem ziemi
            l.tiles.filter(isVis).forEach(t => { 
                if(t.id==='ziemia'||t.id==='trawa'||t.id==='kamien'||t.id==='piasek') {
                    ctx.fillStyle = t.id==='kamien'?'#333':t.id==='piasek'?'#d35400':'#5c3a21';
                    ctx.fillRect(Math.floor(t.x-this.camX), Math.floor(t.y), t.w+1, t.h+1); 
                }
                this.spr(t.id, t.x-this.camX, t.y, t.w, t.h); 
            });
            
            l.hazards.filter(isVis).forEach(h => this.spr(h.id, h.x-this.camX, h.y, h.w, h.h));
            ctx.globalAlpha = 0.65; l.waters.filter(isVis).forEach(w => this.spr('woda', w.x-this.camX, w.y, w.w, w.h)); ctx.globalAlpha = 1;
            l.items.filter(isVis).forEach(i => this.spr(i.id, i.x-this.camX, i.y, i.w, i.h));
            
            l.chicks.forEach(c => {
                let bounce = Math.sin(this.ticks * 0.1) * 10;
                this.spr('kurczak', c.x-this.camX, c.y + bounce, c.w, c.h);
                this.txt("TUTAJ!", c.x-this.camX + c.w/2, c.y + bounce - 15, 18, "#f1c40f");
            });

            this.ptc.draw(ctx, this.camX);

            ctx.save(); ctx.translate(p.x - this.camX + p.w/2, p.y + p.h/2); if (p.dir === -1) ctx.scale(-1, 1);
            let s = p.dead ? 'kuraNuggets' : (p.vx !== 0 ? 'KuraChodzaca' : 'KuraStojaca');
            if (!p.onGround && !p.dead) s = 'KuraSkok'; 
            if ((input.k['w']||input.k[' ']) && !p.onGround && p.vy>0 && p.fuel>0) s = 'KuraSzybujaca'; 
            if (p.crouch) s = 'KuraKlucanie';
            this.spr(s, -p.w/2, -p.h/2, p.w, p.h); 
            if(p.shield > 0) { ctx.globalAlpha = 0.5; this.spr('tarcza', -p.w/2-10, -p.h/2-10, p.w+20, p.h+20); ctx.globalAlpha = 1; }
            ctx.restore();

            ctx.save(); ctx.translate(750, 50); ctx.rotate(this.ticks * 0.02); this.spr('zebatka', -30, -30, 60, 60); ctx.restore();
            
            ctx.textAlign = "left"; this.txt("PKT: " + p.score, 20, 50, 32, "white");
            let tY = 90;
            if(p.shield > 0) { this.spr('tarcza', 20, tY, 35, 35); this.txt(Math.ceil(p.shield/60)+"s", 85, tY+26, 24, "white"); tY += 45; }
            if(p.jumpB > 0) { this.spr('strzalkaSkoku', 20, tY, 35, 35); this.txt(Math.ceil(p.jumpB/60)+"s", 85, tY+26, 24, "white"); }
            
            if (C.IS_MOBILE) { 
                let jh = input.j.h; let jv = input.j.v;
                ctx.globalAlpha = 0.8; this.spr('poziomo', jh.x, jh.y, jh.w, jh.h); this.spr('skokk', jv.x, jv.y, jv.w, jv.h); ctx.globalAlpha = 1.0;
                ctx.textAlign = "center"; this.txt("RUCH", jh.x + jh.w/2, jh.y - 15, 18, "white"); this.txt("SKOK/LOT", jv.x + jv.w/2, jv.y - 15, 18, "white"); this.txt("KUCANIE", jv.x + jv.w/2, jv.y + jv.h + 25, 18, input.crouch ? "#2ecc71" : "white");
            }
            
            if (this.state === "WIN") {
                ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,C.W, C.H);
                let sz = 60 + Math.sin(this.ticks * 0.15) * 5;
                this.txt("KURCZAK URATOWANY!", 400, 300, sz, "#f1c40f"); this.txt("+100 PKT DO CHWAŁY", 400, 360, 26, "white");
            }

            if (this.paused) { 
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,C.W, C.H); 
                if (this.pMenu === "MAIN") {
                    this.txt("PAUZA", 400, 180, 56, "white"); ctx.fillStyle = "#2ecc71"; ctx.fillRect(300, 280, 200, 60); this.txt("WZNÓW", 400, 318, 24, "white");
                    ctx.fillStyle = "#3498db"; ctx.fillRect(300, 360, 200, 60); this.txt("USTAWIENIA", 400, 398, 24, "white"); ctx.fillStyle = "#e74c3c"; ctx.fillRect(300, 440, 200, 60); this.txt("WYJDŹ", 400, 478, 24, "white");
                } else if (this.pMenu === "SETTINGS") {
                    this.txt("USTAWIENIA", 400, 180, 56, "white"); ctx.fillStyle = "#e67e22"; ctx.fillRect(280, 320, 240, 60); this.txt("RESET ZAPISU", 400, 358, 22, "white");
                    ctx.fillStyle = "#95a5a6"; ctx.fillRect(280, 460, 240, 60); this.txt("WRÓĆ", 400, 498, 24, "white");
                }
            }
        }
        ctx.textAlign = "left"; this.txt("v3.0 ULTIMATE", 10, 25, 16, "rgba(255,255,255,0.7)");
    }
}

// ============================================================================
// [7] INICJALIZACJA
// ============================================================================
const A = new AssetManager();
const input = new InputManager();
const game = new Game();

canvas.addEventListener("mousedown", e => {
    const r = canvas.getBoundingClientRect();
    game.click((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
});

A.load(() => { game.state = "LOBBY"; });

function loop() { game.update(); game.draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

</script>
